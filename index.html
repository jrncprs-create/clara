    function getChatMessagesEl() {
      return document.getElementById('chatMessages');
    }

    function scrollChatToBottom(force = false) {
      const chatMessages = getChatMessagesEl();
      if (!chatMessages) return;

      const distanceFromBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight;
      if (force || distanceFromBottom < 140) {
        requestAnimationFrame(() => {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        });
      }
    }

    function scrollChatToBottomIfNearEnd() {
      scrollChatToBottom(false);
    }

    function pinChatThinkingToEnd() {
      const wrap = getChatMessagesEl();
      const th = document.getElementById('chatThinking');
      if (wrap && th) wrap.appendChild(th);
    }

    function setChatThinking(on) {
      const el = document.getElementById('chatThinking');
      if (!el) return;
      if (on) {
        pinChatThinkingToEnd();
        el.classList.add('is-visible');
        scrollChatToBottom(true);
      } else {
        el.classList.remove('is-visible');
      }
    }

    function addChatBubble(text, sender) {
      if (!text) return;
      const chatMessages = getChatMessagesEl();
      const bubble = document.createElement('div');
      bubble.className = `bubble ${sender}`;
      bubble.textContent = text;
      chatMessages.appendChild(bubble);
      pinChatThinkingToEnd();
      scrollChatToBottom(true);
    }

    function addChatOptions(options = []) {
      if (!Array.isArray(options) || !options.length) return;

      const chatMessages = getChatMessagesEl();
      const wrap = document.createElement('div');
      wrap.className = 'chat-options';

      options.forEach(option => {
        const value = String(option?.value ?? '').trim();
        const label = String(option?.label ?? value).trim();
        if (!value || !label) return;

        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.type = 'button';
        btn.textContent = label;
        btn.addEventListener('click', () => sendChatWithText(value));
        wrap.appendChild(btn);
      });

      if (wrap.childElementCount) {
        chatMessages.appendChild(wrap);
        pinChatThinkingToEnd();
        scrollChatToBottom(true);
      }
    }

    function addChatMetaLine(text) {
      if (!text) return;
      const chatMessages = getChatMessagesEl();
      const meta = document.createElement('div');
      meta.className = 'chat-meta';
      meta.textContent = text;
      chatMessages.appendChild(meta);
      pinChatThinkingToEnd();
      scrollChatToBottom(true);
    }

    function getReplyText(result, fallback = '') {
      return (
        result?.reply ||
        result?.confirmation?.text ||
        result?.question?.text ||
        fallback
      );
    }

    function handleChatApiError(result, fallback = 'Er ging iets mis.') {
      addChatBubble(result?.reply || result?.details || fallback, 'clara');
    }

    function openQuestionInChat(question, meta = null) {
      addChatBubble(question?.text || 'Kun je dit iets preciezer maken?', 'clara');

      if (Array.isArray(question?.options) && question.options.length) {
        addChatOptions(question.options);
      }

      if (meta?.blocked_by === 'missing_date') addChatMetaLine('Datum ontbreekt.');
      if (meta?.blocked_by === 'missing_time') addChatMetaLine('Tijd ontbreekt.');
    }

    async function handleApiResult(result, { reloadDashboard = false } = {}) {
      if (!result) return;

      const mode = String(result.mode || '').toLowerCase();

      if (mode !== 'review' && currentReviewData) {
        closeReviewPane(true);
      }

      if (mode === 'review' && result.review) {
        openReviewPane(result);
        addChatBubble(getReplyText(result, 'Controleer dit even.'), 'clara');
        return;
      }

      if (mode === 'question') {
        openQuestionInChat(result.question, result.meta || null);
        return;
      }

      if (mode === 'confirmation') {
        addChatBubble(getReplyText(result, 'Opgeslagen.'), 'clara');

        const skippedDuplicates = Array.isArray(result?.confirmation?.skipped_duplicates)
          ? result.confirmation.skipped_duplicates
          : [];

        if (skippedDuplicates.length) {
          const labels = skippedDuplicates
            .map(item => item?.title)
            .filter(Boolean)
            .slice(0, 3);

          if (labels.length === 1) {
            addChatMetaLine(`Dubbel overgeslagen: ${labels[0]}`);
          } else if (labels.length > 1) {
            const extraCount = skippedDuplicates.length - labels.length;
            addChatMetaLine(`Dubbel overgeslagen: ${labels.join(', ')}${extraCount > 0 ? ` +${extraCount}` : ''}`);
          } else {
            addChatMetaLine(`Dubbel overgeslagen: ${skippedDuplicates.length} item(s)`);
          }
        }

        if (reloadDashboard) await loadDashboard();
        return;
      }

      addChatBubble(getReplyText(result, 'Klaar.'), 'clara');
      if (reloadDashboard) await loadDashboard();
    }

    function getReviewItems() {
      return currentReviewData?.review?.items || [];
    }

    function findReviewItem(tempId) {
      return getReviewItems().find(item => item.temp_id === tempId);
    }

    function getMetaParts(item) {
      const parts = [];
      if (item.date) parts.push(item.date);
      if (item.time) parts.push(item.time);
      else if (String(item.type || '').toLowerCase() === 'afspraak' && item.date) parts.push('hele dag');
      if (item.project) parts.push(item.project);
      if (item.priority) parts.push(`prio ${item.priority}`);
      if (item.status && String(item.type || '').toLowerCase() === 'taak') parts.push(item.status);
      if (item.project_match && item.project_match.name) {
        const c = item.project_match.confidence;
        const scorePart = typeof c === 'number' && Number.isFinite(c) ? c.toFixed(2) : String(c ?? '');
        parts.push(`Project: ${item.project_match.name} (confidence: ${scorePart})`);
      }
      return parts;
    }

    function applyNotitieRulesToReviewItem(item) {
      if (String(item.type || '').toLowerCase() !== 'notitie') return;
      item.date = '';
      item.end_date = '';
      item.time = '';
      item.status = '';
      item.priority = '';
    }

    function getValidationIssues(item) {
      return Array.isArray(item?.validation_issues) ? item.validation_issues : [];
    }

    function getInvalidFields(item) {
      return Array.isArray(item?.invalid_fields) ? item.invalid_fields : [];
    }

    function isReviewFieldInvalid(item, field) {
      return getInvalidFields(item).includes(field);
    }

    function getReviewFieldError(item, field) {
      const issue = getValidationIssues(item).find(entry => entry?.field === field);
      return issue?.reason || '';
    }

    function renderReviewFieldHelp(item, field) {
      const error = getReviewFieldError(item, field);
      if (!error) return '';
      return `<div class="field-help is-error">${escapeHtml(error)}</div>`;
    }

    function reviewFieldClass(item, field) {
      return isReviewFieldInvalid(item, field) ? 'field is-invalid' : 'field';
    }

    function countReviewInvalidFields() {
      return getReviewItems().reduce((sum, item) => sum + getInvalidFields(item).length, 0);
    }

    function openReviewPane(reviewData) {
      currentReviewData = reviewData;
      currentReviewInlineEditTempId = null;
      document.getElementById('reviewSummaryText').textContent = reviewData?.review?.summary || '';
      document.getElementById('reviewSubtitle').textContent = reviewData?.reply || 'Controleer en pas aan waar nodig.';
      renderReviewItemsCompact();
      updateReviewFooter();
      syncAppModes();
      scrollChatToBottom(true);
    }

    function closeReviewPane(silent = false) {
      currentReviewData = null;
      currentReviewInlineEditTempId = null;
      document.getElementById('reviewItems').innerHTML = '';
      document.getElementById('reviewSummaryText').textContent = '';
      document.getElementById('reviewFooterText').textContent = 'Nog niet opgeslagen.';
      syncAppModes();

      if (!silent) {
        setTimeout(() => {
          const input = document.getElementById('chatInput');
          if (input) input.focus();
        }, 180);
      }
    }

    function updateReviewFooter() {
      const count = getReviewItems().length;
      const invalidCount = countReviewInvalidFields();

      if (!count) {
        document.getElementById('reviewFooterText').textContent = 'Geen items.';
        return;
      }

      if (invalidCount > 0) {
        document.getElementById('reviewFooterText').textContent = `${invalidCount} controle${invalidCount === 1 ? '' : 's'} nodig.`;
        return;
      }

      document.getElementById('reviewFooterText').textContent = `${count} klaar om op te slaan.`;
    }

    function openReviewInlineEdit(tempId) {
      const item = findReviewItem(tempId);
      if (!item) return;
      currentReviewInlineEditTempId = tempId;
      renderReviewItemsCompact();

      requestAnimationFrame(() => {
        const el = document.querySelector(`[data-review-temp-id="${CSS.escape(tempId)}"]`);
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        setTimeout(() => {
          const input = el.querySelector('.input, .select, .textarea');
          if (input) input.focus();
        }, 220);
      });
    }

    function closeReviewInlineEdit() {
      currentReviewInlineEditTempId = null;
      renderReviewItemsCompact();
    }

    function updateReviewInlineField(tempId, field, value) {
      const item = findReviewItem(tempId);
      if (!item) return;

      item[field] = value;

      if (field === 'type' && String(value).toLowerCase() === 'notitie') {
        item.status = '';
        item.priority = '';
        item.date = '';
        item.end_date = '';
        item.time = '';
      }
    }

    function saveReviewInlineEdit(tempId) {
      const item = findReviewItem(tempId);
      if (!item) return;
      applyNotitieRulesToReviewItem(item);
      currentReviewInlineEditTempId = null;
      renderReviewItemsCompact();
      updateReviewFooter();
    }

    function getReviewSignalsHtml(item) {
      const chips = [];
      const issues = getValidationIssues(item);

      issues.forEach(issue => {
        chips.push(`<span class="signal invalid">${escapeHtml(issue?.reason || 'controle nodig')}</span>`);
      });

      if (item?.duplicate_warning) {
        const text = item?.duplicate_match_title
          ? `lijkt op: ${item.duplicate_match_title}`
          : 'waarschijnlijk dubbel';
        chips.push(`<span class="signal duplicate">${escapeHtml(text)}</span>`);
      }

      if (!chips.length) return '';
      return `<div class="review-signals">${chips.join('')}</div>`;
    }

    function renderReviewEditPanel(item) {
      const isOpen = currentReviewInlineEditTempId === item.temp_id;
      if (!isOpen) return '';

      const isNote = String(item.type || '').toLowerCase() === 'notitie';

      if (isNote) {
        return `
          <div class="review-edit">
            <div class="edit-grid">
              <div class="${reviewFieldClass(item, 'type')}">
                <div class="label">Type</div>
                <select class="select" onchange="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'type', this.value)">
                  <option value="taak" ${item.type === 'taak' ? 'selected' : ''}>taak</option>
                  <option value="afspraak" ${item.type === 'afspraak' ? 'selected' : ''}>afspraak</option>
                  <option value="notitie" ${item.type === 'notitie' ? 'selected' : ''}>notitie</option>
                  <option value="idee" ${item.type === 'idee' ? 'selected' : ''}>idee</option>
                  <option value="project" ${item.type === 'project' ? 'selected' : ''}>project</option>
                  <option value="beslissing" ${item.type === 'beslissing' ? 'selected' : ''}>beslissing</option>
                </select>
                ${renderReviewFieldHelp(item, 'type')}
              </div>
              <div class="${reviewFieldClass(item, 'project')}">
                <div class="label">Project</div>
                <input class="input" value="${escapeHtml(item.project || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'project', this.value)" />
                ${renderReviewFieldHelp(item, 'project')}
              </div>
            </div>

            <div class="edit-grid single" style="margin-top:12px;">
              <div class="${reviewFieldClass(item, 'title')}">
                <div class="label">Titel</div>
                <input class="input" value="${escapeHtml(item.title || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'title', this.value)" />
                ${renderReviewFieldHelp(item, 'title')}
              </div>
            </div>

            <div class="edit-grid single" style="margin-top:12px;">
              <div class="${reviewFieldClass(item, 'summary')}">
                <div class="label">Samenvatting</div>
                <textarea class="textarea" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'summary', this.value)">${escapeHtml(item.summary || '')}</textarea>
                ${renderReviewFieldHelp(item, 'summary')}
              </div>
            </div>

            <div class="edit-grid single" style="margin-top:12px;">
              <div class="${reviewFieldClass(item, 'source_text')}">
                <div class="label">Brontekst</div>
                <input class="input" value="${escapeHtml(item.source_text || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'source_text', this.value)" />
                ${renderReviewFieldHelp(item, 'source_text')}
              </div>
            </div>

            <div class="edit-actions">
              <button class="btn ghost" type="button" onclick="closeReviewInlineEdit()">Terug</button>
              <button class="btn primary" type="button" onclick="saveReviewInlineEdit('${escapeHtml(item.temp_id || '')}')">Bewaren</button>
            </div>
          </div>
        `;
      }

      return `
        <div class="review-edit">
          <div class="edit-grid">
            <div class="${reviewFieldClass(item, 'type')}">
              <div class="label">Type</div>
              <select class="select" onchange="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'type', this.value)">
                <option value="taak" ${item.type === 'taak' ? 'selected' : ''}>taak</option>
                <option value="afspraak" ${item.type === 'afspraak' ? 'selected' : ''}>afspraak</option>
                <option value="notitie" ${item.type === 'notitie' ? 'selected' : ''}>notitie</option>
                <option value="idee" ${item.type === 'idee' ? 'selected' : ''}>idee</option>
                <option value="project" ${item.type === 'project' ? 'selected' : ''}>project</option>
                <option value="beslissing" ${item.type === 'beslissing' ? 'selected' : ''}>beslissing</option>
              </select>
              ${renderReviewFieldHelp(item, 'type')}
            </div>
            <div class="${reviewFieldClass(item, 'project')}">
              <div class="label">Project</div>
              <input class="input" value="${escapeHtml(item.project || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'project', this.value)" />
              ${renderReviewFieldHelp(item, 'project')}
            </div>
          </div>

          <div class="edit-grid single" style="margin-top:12px;">
            <div class="${reviewFieldClass(item, 'title')}">
              <div class="label">Titel</div>
              <input class="input" value="${escapeHtml(item.title || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'title', this.value)" />
              ${renderReviewFieldHelp(item, 'title')}
            </div>
          </div>

          <div class="edit-grid single" style="margin-top:12px;">
            <div class="${reviewFieldClass(item, 'summary')}">
              <div class="label">Samenvatting</div>
              <textarea class="textarea" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'summary', this.value)">${escapeHtml(item.summary || '')}</textarea>
              ${renderReviewFieldHelp(item, 'summary')}
            </div>
          </div>

          <div class="edit-grid" style="margin-top:12px;">
            <div class="${reviewFieldClass(item, 'date')}">
              <div class="label">Datum</div>
              <input class="input" value="${escapeHtml(item.date || '')}" placeholder="2026-04-01" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'date', this.value)" />
              ${renderReviewFieldHelp(item, 'date')}
            </div>
            <div class="${reviewFieldClass(item, 'time')}">
              <div class="label">Tijd</div>
              <input class="input" value="${escapeHtml(item.time || '')}" placeholder="14:00" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'time', this.value)" />
              ${renderReviewFieldHelp(item, 'time')}
            </div>
          </div>

          <div class="edit-grid" style="margin-top:12px;">
            <div class="${reviewFieldClass(item, 'status')}">
              <div class="label">Status</div>
              <input class="input" value="${escapeHtml(item.status || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'status', this.value)" />
              ${renderReviewFieldHelp(item, 'status')}
            </div>
            <div class="${reviewFieldClass(item, 'priority')}">
              <div class="label">Prioriteit</div>
              <select class="select" onchange="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'priority', this.value)">
                <option value="" ${!item.priority ? 'selected' : ''}>-</option>
                <option value="hoog" ${item.priority === 'hoog' ? 'selected' : ''}>hoog</option>
                <option value="middel" ${item.priority === 'middel' ? 'selected' : ''}>middel</option>
                <option value="laag" ${item.priority === 'laag' ? 'selected' : ''}>laag</option>
              </select>
              ${renderReviewFieldHelp(item, 'priority')}
            </div>
          </div>

          <div class="edit-grid single" style="margin-top:12px;">
            <div class="${reviewFieldClass(item, 'source_text')}">
              <div class="label">Brontekst</div>
              <input class="input" value="${escapeHtml(item.source_text || '')}" oninput="updateReviewInlineField('${escapeHtml(item.temp_id || '')}', 'source_text', this.value)" />
              ${renderReviewFieldHelp(item, 'source_text')}
            </div>
          </div>

          <div class="edit-actions">
            <button class="btn ghost" type="button" onclick="closeReviewInlineEdit()">Terug</button>
            <button class="btn primary" type="button" onclick="saveReviewInlineEdit('${escapeHtml(item.temp_id || '')}')">Bewaren</button>
          </div>
        </div>
      `;
    }

    function renderReviewItemsCompact() {
      const wrap = document.getElementById('reviewItems');
      const items = getReviewItems();

      if (!items.length) {
        wrap.innerHTML = `<div class="empty">Geen items om te controleren.</div>`;
        return;
      }

      wrap.innerHTML = items.map((item, index) => {
        const metaParts = getMetaParts(item);
        const isOpen = currentReviewInlineEditTempId === item.temp_id;
        const hasOtherOpen = !!currentReviewInlineEditTempId && currentReviewInlineEditTempId !== item.temp_id;
        const hasInvalid = getValidationIssues(item).length > 0;
        const classes = [
          'review-card',
          isOpen ? 'is-open' : '',
          hasOtherOpen ? 'is-dimmed' : '',
          hasInvalid ? 'has-invalid' : ''
        ].filter(Boolean).join(' ');

        return `
          <div class="${classes}" data-review-temp-id="${escapeHtml(item.temp_id || '')}">
            <div class="review-card-head">
              <div class="review-badge">${escapeHtml(item.type || 'notitie')}</div>
              <div class="review-main">
                <div class="review-card-title">${escapeHtml(item.title || `Item ${index + 1}`)}</div>
                <div class="review-meta">${escapeHtml(metaParts.length ? metaParts.join(' • ') : 'geen extra info')}</div>
              </div>
              <div class="item-actions">
                <button class="icon-btn" type="button" onclick="openReviewInlineEdit('${escapeHtml(item.temp_id || '')}')" aria-label="Aanpassen">
                  ${editIconSvg()}
                </button>
                <button class="icon-btn" type="button" onclick="requestReviewDelete('${escapeHtml(item.temp_id || '')}')" aria-label="Verwijderen">
                  ${deleteIconSvg()}
                </button>
              </div>
            </div>
            ${getReviewSignalsHtml(item)}
            ${renderReviewEditPanel(item)}
          </div>
        `;
      }).join('');
    }

    function deleteReviewItem(tempId) {
      if (!currentReviewData?.review?.items) return;

      currentReviewData.review.items = currentReviewData.review.items.filter(item => item.temp_id !== tempId);

      if (currentReviewInlineEditTempId === tempId) {
        currentReviewInlineEditTempId = null;
      }

      renderReviewItemsCompact();
      updateReviewFooter();

      if (!getReviewItems().length) {
        closeReviewPane();
      }
    }

    function openConfirmDialog({ title, subtitle, onConfirm }) {
      pendingConfirmAction = onConfirm;
      document.getElementById('confirmItemTitle').textContent = title || 'Item';
      document.getElementById('confirmSubtitle').textContent = subtitle || 'Dit item wordt verwijderd.';
      document.getElementById('confirmOverlay').classList.add('open');
    }

    function closeConfirmDialog() {
      pendingConfirmAction = null;
      document.getElementById('confirmOverlay').classList.remove('open');
    }

    async function runConfirmAction() {
      if (typeof pendingConfirmAction === 'function') {
        const action = pendingConfirmAction;
        closeConfirmDialog();
        await action();
      } else {
        closeConfirmDialog();
      }
    }

    function requestReviewDelete(tempId) {
      const item = findReviewItem(tempId);
      if (!item) return;

      openConfirmDialog({
        title: item.title || 'Item',
        subtitle: 'Dit item wordt uit deze review verwijderd.',
        onConfirm: async () => {
          deleteReviewItem(tempId);
        }
      });
    }

    function requestDashboardDelete(editKey, fallbackTitle = 'Item') {
      const item = dashboardEditIndex.get(editKey);
      if (!item) return;

      openConfirmDialog({
        title: item.title || fallbackTitle,
        subtitle: 'Dit item wordt uit de database verwijderd.',
        onConfirm: async () => {
          await deleteDashboardItem(item);
        }
      });
    }

    async function deleteDashboardItem(item) {
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'delete_item',
            session_id: getSessionId(),
            id: item.id || '',
            item_id: item.id || '',
            type: item.type || '',
            title: item.title || '',
            date: item.date || '',
            time: item.time || '',
            project: item.project || ''
          })
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          handleChatApiError(result, 'Verwijderen ging mis.');
          return;
        }

        if (dashboardPanelEdit?.editKey === item._editKey) {
          dashboardPanelEdit = null;
        }

        await handleApiResult(result, { reloadDashboard: true });
      } catch (error) {
        addChatBubble(`Verbinding mislukt: ${error.message || 'unknown error'}`, 'clara');
      }
    }

    async function saveReviewedItems() {
      const saveBtn = document.getElementById('reviewSaveBtn');
      const footerText = document.getElementById('reviewFooterText');
      const items = getReviewItems();

      if (!items.length) {
        footerText.textContent = 'Geen items.';
        return;
      }

      saveBtn.disabled = true;
      footerText.textContent = 'Opslaan...';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'confirm_review',
            session_id: getSessionId(),
            items
          })
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          footerText.textContent = `Opslaan mislukt.`;
          handleChatApiError(result, 'Opslaan ging mis.');
          return;
        }

        if (String(result.mode || '').toLowerCase() === 'question') {
          footerText.textContent = 'Controle nodig.';
          await handleApiResult(result, { reloadDashboard: false });
          return;
        }

        if (String(result.mode || '').toLowerCase() === 'review') {
          currentReviewData = result;
          currentReviewInlineEditTempId = null;
          document.getElementById('reviewSubtitle').textContent = result?.reply || 'Controleer en pas aan waar nodig.';
          document.getElementById('reviewSummaryText').textContent = result?.review?.summary || '';
          renderReviewItemsCompact();
          updateReviewFooter();
          syncAppModes();
          return;
        }

        closeReviewPane();
        await handleApiResult(result, { reloadDashboard: true });
      } catch (error) {
        footerText.textContent = `Verbinding mislukt.`;
        addChatBubble(`Verbinding mislukt: ${error.message || 'unknown error'}`, 'clara');
      } finally {
        saveBtn.disabled = false;
        updateReviewFooter();
      }
    }

    async function sendChatInternal(text) {
      const button = document.getElementById('chatSend');
      const input = document.getElementById('chatInput');
      button.disabled = true;
      if (input) input.disabled = true;
      setChatThinking(true);

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            session_id: getSessionId()
          })
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          handleChatApiError(result, 'Opslaan ging mis.');
          return;
        }

        await handleApiResult(result, {
          reloadDashboard: ['reply', 'confirmation'].includes(String(result.mode || '').toLowerCase())
        });
      } catch (error) {
        addChatBubble(`Verbinding mislukt: ${error.message || 'unknown error'}`, 'clara');
      } finally {
        button.disabled = false;
        if (input) input.disabled = false;
        setChatThinking(false);
        syncViewportHeight();
        scrollChatToBottom(true);
      }
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      addChatBubble(text, 'user');
      input.value = '';
      syncViewportHeight();
      await sendChatInternal(text);
    }

    async function sendChatWithText(text) {
      const value = String(text || '').trim();
      if (!value) return;
      addChatBubble(value, 'user');
      syncViewportHeight();
      await sendChatInternal(value);
    }

    function selectAgendaDay(dayKey) {
      selectedAgendaDayKey = dayKey;
      renderAgenda(dashboardRawData);
    }

    async function loadDashboard() {
      try {
        const response = await fetch('/api/dashboard', { cache: 'no-store' });
        const data = await response.json();

        dashboardRawData = {
          agenda: Array.isArray(data?.agenda) ? data.agenda : [],
          tasks: Array.isArray(data?.tasks) ? data.tasks : [],
          notes: Array.isArray(data?.notes) ? data.notes : []
        };

        buildDashboardEditIndex(dashboardRawData);

        if (dashboardPanelEdit && !dashboardEditIndex.has(dashboardPanelEdit.editKey)) {
          dashboardPanelEdit = null;
        }

        renderAllPanels();
      } catch (error) {
        dashboardRawData = { agenda: [], tasks: [], notes: [] };
        buildDashboardEditIndex(dashboardRawData);
        renderAllPanels();
      }
    }

    document.getElementById('chatSend').addEventListener('click', sendChat);

    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    document.getElementById('chatInput').addEventListener('focus', () => {
      setTimeout(syncViewportHeight, 60);
      setTimeout(() => scrollChatToBottom(true), 100);
    });

    document.getElementById('chatInput').addEventListener('blur', () => {
      setTimeout(syncViewportHeight, 140);
    });

    document.getElementById('reviewClose').addEventListener('click', () => closeReviewPane());
    document.getElementById('reviewCancelBtn').addEventListener('click', () => closeReviewPane());
    document.getElementById('reviewSaveBtn').addEventListener('click', saveReviewedItems);

    document.getElementById('confirmOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'confirmOverlay') closeConfirmDialog();
    });

    document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirmDialog);
    document.getElementById('confirmOkBtn').addEventListener('click', runConfirmAction);

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        syncViewportHeight();
        scrollChatToBottomIfNearEnd();
      });
      window.visualViewport.addEventListener('scroll', () => {
        syncViewportHeight();
      });
    }

    window.addEventListener('resize', () => {
      syncViewportHeight();
      scrollChatToBottomIfNearEnd();
    });

    window.addEventListener('orientationchange', () => {
      syncViewportHeight();
      scrollChatToBottomIfNearEnd();
    });

    window.openDashboardEdit = openDashboardEdit;
    window.closeDashboardInlineEdit = closeDashboardInlineEdit;
    window.updateDashboardInlineField = updateDashboardInlineField;
    window.saveDashboardInlineEdit = saveDashboardInlineEdit;
    window.requestDashboardDelete = requestDashboardDelete;
    window.openReviewInlineEdit = openReviewInlineEdit;
    window.closeReviewInlineEdit = closeReviewInlineEdit;
    window.updateReviewInlineField = updateReviewInlineField;
    window.saveReviewInlineEdit = saveReviewInlineEdit;
    window.requestReviewDelete = requestReviewDelete;
    window.selectAgendaDay = selectAgendaDay;
    window.sendChatWithText = sendChatWithText;

    syncViewportHeight();
    setInterval(() => {
      loadDashboard();
    }, 60000);

    loadDashboard();
  </script>
</body>
</html>

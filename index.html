<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clara</title>

  <style>

  /* ================================
     GLOBAL RESET
  ================================= */
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* ================================
     SCROLLBAR (MINIMAL STYLE)
     👉 DIT IS JE NIEUWE SCROLLBAR
  ================================= */
  *::-webkit-scrollbar {
    width: 6px;
  }

  *::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.04);
    border-radius: 999px;
  }

  *::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.18);
    border-radius: 999px;
  }

  *::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.28);
  }

  /* Firefox */
  * {
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.18) rgba(255,255,255,0.04);
  }

  /* ================================
     BACKGROUND
  ================================= */
  body {
    padding: 14px;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 30%),
      #000;
  }

  /* ================================
     VERSION LABEL
  ================================= */
  .version {
    position: fixed;
    top: 10px;
    right: 14px;
    font-size: 11px;
    opacity: 0.4;
  }

  /* ================================
     GRID LAYOUT
  ================================= */
  .app {
    width: 100%;
    height: calc(100vh - 28px);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
  }

  .panel {
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 22px;
    background: rgba(255,255,255,0.02);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    height: 44px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .panel-body {
    flex: 1;
    overflow: auto;
    padding: 10px;
  }

  .agenda-panel { grid-column: 1; grid-row: 1 / 3; }
  .tasks-panel { grid-column: 2; grid-row: 1; }
  .notes-panel { grid-column: 3; grid-row: 1; }
  .appointments-panel { grid-column: 2; grid-row: 2; }
  .chat-panel { grid-column: 3; grid-row: 2; }

  /* ================================
     UI ELEMENTS
  ================================= */
  .card {
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    margin-bottom: 8px;
  }

  .agenda-item {
    margin-bottom: 6px;
  }

  .chat-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .chat-messages {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chat-bubble {
    padding: 10px;
    border-radius: 10px;
    max-width: 85%;
  }

  .chat-bubble.user {
    align-self: flex-end;
    background: #fff;
    color: #000;
  }

  .chat-bubble.clara {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
  }

  .chat-inputbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding-top: 8px;
  }

  .chat-input {
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
    height: 40px;
    border-radius: 10px;
    padding: 0 10px;
  }

  .chat-send {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 0 12px;
  }

  </style>
</head>

<body>

<!-- ================================
     VERSION LABEL
================================= -->
<div class="version" id="version"></div>

<div class="app">

  <div class="panel agenda-panel">
    <div class="panel-header"><div class="panel-title">Agenda</div></div>
    <div class="panel-body" id="agenda"></div>
  </div>

  <div class="panel tasks-panel">
    <div class="panel-header"><div class="panel-title">Taken</div></div>
    <div class="panel-body" id="tasks"></div>
  </div>

  <div class="panel notes-panel">
    <div class="panel-header"><div class="panel-title">Notities</div></div>
    <div class="panel-body" id="notes"></div>
  </div>

  <div class="panel appointments-panel">
    <div class="panel-header"><div class="panel-title">Afspraken</div></div>
    <div class="panel-body" id="appointments"></div>
  </div>

  <div class="panel chat-panel">
    <div class="panel-header"><div class="panel-title">Chat</div></div>
    <div class="panel-body">
      <div class="chat-shell">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-inputbar">
          <input id="chatInput" class="chat-input" />
          <button id="chatSend" class="chat-send">OK</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>

/* ================================
   VERSION SYSTEM
================================= */
const version = "v2.1"
const now = new Date().toLocaleString()
document.getElementById("version").innerText = `${version} • ${now}`

/* ================================
   RENDER FUNCTIONS
================================= */
function renderAgenda(data) {
  document.getElementById("agenda").innerHTML =
    data.agenda.map(i => `<div class="agenda-item">${i.title}</div>`).join('')
}

function renderTasks(data) {
  document.getElementById("tasks").innerHTML =
    data.tasks.map(i => `<div class="card">${i.title}</div>`).join('')
}

function renderNotes(data) {
  document.getElementById("notes").innerHTML =
    data.notes.map(i => `<div class="card">${i.title}</div>`).join('')
}

function renderAppointments(data) {
  document.getElementById("appointments").innerHTML =
    data.agenda.map(i => `<div class="card">${i.title}</div>`).join('')
}

/* ================================
   DATA LOAD
================================= */
async function loadDashboard() {
  const res = await fetch('/api/dashboard')
  const data = await res.json()

  renderAgenda(data)
  renderTasks(data)
  renderNotes(data)
  renderAppointments(data)
}

loadDashboard()

</script>

</body>
</html>

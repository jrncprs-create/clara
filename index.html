<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clara 4 Core Lab v0.12.9</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#1e1e1e}
    iframe{display:block;width:100%;height:100%;border:0;background:#1e1e1e}
  </style>
</head>
<body>
  <iframe id="claraFrame" src="/clara-4-core-lab/index.html" title="Clara 4 Core Lab v0.12.9"></iframe>
  <script>
    const frame=document.getElementById('claraFrame');
    frame.addEventListener('load',()=>{
      const w=frame.contentWindow;
      const d=frame.contentDocument;
      if(!w||!d)return;
      document.title='Clara 4 Core Lab v0.12.9';
      const innerTitle=d.querySelector('title');
      if(innerTitle)innerTitle.textContent='Clara 4 Core Lab v0.12.9';
      const tag=d.querySelector('.state-tag');
      if(tag)tag.textContent='v0.12.9 · Lab state';

      const temp=d.getElementById('clockTemp');
      if(temp)temp.textContent='Amsterdam · 17°';
      const weatherIcon=d.querySelector('.weather-icon');
      if(weatherIcon)weatherIcon.textContent='☀';

      const style=d.createElement('style');
      style.textContent=`
        .event.confirmed{background:rgba(255,255,255,.105)!important;border:1px solid rgba(255,255,255,.28)!important}
        .event.pencil,.event.needs_time{background:rgba(255,255,255,.045)!important;border:1px dashed rgba(255,255,255,.16)!important}
        .box.done{background:rgba(255,255,255,.16)!important;border-color:rgba(255,255,255,.45)!important}
        .date-panel{min-height:110px!important}
        .clock-weather{margin-top:7px!important;font-size:12px!important;gap:8px!important}
        .weather-icon{font-size:19px!important}
        .cols{grid-template-rows:auto auto 1fr!important}
        .date-panel{grid-column:3/5!important;grid-row:1!important}
        .regie-col{grid-column:3/5!important;grid-row:2!important;min-height:210px!important}
        .attention-col{grid-column:3/5!important;grid-row:3!important}
        .regie-col .col-head{padding:14px 16px!important}
        .regie-col .col-title{font-size:16px!important}
        .regie-col .col-sub{font-size:11px!important}
        .regie-col .card:first-child h3{font-size:15px!important;margin-bottom:10px!important}
        .regie-col .card:first-child .mini,.regie-col .card:first-child .mini-edit{font-size:13px!important;line-height:1.45!important;color:#ececec!important}
        .regie-col .stack{gap:10px!important}
      `;
      d.head.appendChild(style);

      if(typeof w.markOverlaps==='function'){
        const original=w.markOverlaps;
        w.markOverlaps=function(items){
          const clean=(items||[]).map(item=>{const copy=Object.assign({},item);delete copy._frontend_conflict;return copy});
          return original(clean);
        };
      }
      if(typeof w.renderFromState==='function')w.renderFromState();
    });
  </script>
</body>
</html>

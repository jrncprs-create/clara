<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Clara</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #000;
      --panel: #0b0b0b;
      --panel-2: #111;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.14);
      --text: #fff;
      --muted: rgba(255,255,255,0.56);
      --soft: rgba(255,255,255,0.34);
      --ghost: rgba(255,255,255,0.04);
      --ghost-2: rgba(255,255,255,0.06);
      --radius: 18px;
      --radius-sm: 12px;
      --header-h: 46px;
      --shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      --error-line: rgba(255,255,255,0.24);
      --error-bg: rgba(255,255,255,0.06);
      --transition: 280ms cubic-bezier(.2,.8,.2,1);
      --app-height: 100dvh;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    *::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      padding: 14px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 28%),
        #000;
      min-height: var(--app-height);
      height: var(--app-height);
    }

    body, button, input, textarea, select {
      -webkit-tap-highlight-color: transparent;
      font: inherit;
    }

    button, input, textarea, select {
      color: inherit;
    }

    .version {
      position: fixed;
      top: 10px;
      right: 14px;
      z-index: 40;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.34);
      pointer-events: none;
      user-select: none;
    }

    .app {
      width: 100%;
      height: calc(var(--app-height) - 28px);
      min-height: 0;
      display: grid;
      grid-template-columns: 1.08fr 1fr 1fr;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      transition: grid-template-rows var(--transition);
    }

    .panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.015));
      box-shadow: var(--shadow);
      overflow: hidden;
      transition:
        opacity var(--transition),
        transform var(--transition),
        filter var(--transition),
        grid-row var(--transition);
    }

    .panel-header {
      height: var(--header-h);
      min-height: var(--header-h);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
    }

    .panel-meta {
      font-size: 11px;
      color: var(--soft);
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      position: relative;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .agenda-panel { grid-column: 1; grid-row: 1 / 3; }
    .tasks-panel { grid-column: 2; grid-row: 1; }
    .appointments-panel { grid-column: 2; grid-row: 2; }

    .right-stack {
      grid-column: 3;
      grid-row: 1 / 3;
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border-radius: 22px;
    }

    .stack-panel {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.015));
      box-shadow: var(--shadow);
      overflow: hidden;
      transition:
        transform var(--transition),
        opacity var(--transition),
        top var(--transition),
        height var(--transition),
        filter var(--transition);
    }

    .notes-panel {
      top: 0;
      height: calc(50% - 7px);
      z-index: 2;
    }

    .chat-panel {
      top: calc(50% + 7px);
      height: calc(50% - 7px);
      z-index: 1;
    }

    .chat-panel .panel-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      padding: 0;
    }

    .notes-panel .panel-body {
      padding: 0;
    }

    .review-pane {
      position: absolute;
      inset: 0;
      z-index: 8;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(8,8,8,0.985);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-40px);
      transition: transform var(--transition), opacity var(--transition);
    }

    .app.review-mode .chat-panel {
      height: 100%;
      z-index: 6;
    }

    .app.review-mode .notes-panel {
      transform: translateY(36px);
      opacity: 0;
      pointer-events: none;
      filter: blur(8px);
    }

    .app.review-mode .review-pane {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .app.panel-edit-tasks .tasks-panel {
      grid-row: 1 / 3;
      z-index: 6;
    }

    .app.panel-edit-tasks .appointments-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateY(36px);
      filter: blur(8px);
    }

    .app.panel-edit-appointments .appointments-panel {
      grid-row: 1 / 3;
      z-index: 6;
    }

    .app.panel-edit-appointments .tasks-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-36px);
      filter: blur(8px);
    }

    .app.panel-edit-notes .notes-panel {
      top: 0;
      height: 100%;
      z-index: 6;
    }

    .app.panel-edit-notes .chat-panel {
      transform: translateY(-36px);
      opacity: 0;
      pointer-events: none;
      filter: blur(8px);
    }

    .empty {
      padding: 18px;
      color: rgba(255,255,255,0.28);
      font-size: 14px;
    }

    .list {
      display: flex;
      flex-direction: column;
    }

    .item {
      border-bottom: 1px solid var(--line);
      transition: background 160ms ease, opacity 160ms ease;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item.is-dimmed {
      opacity: 0.45;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 16px;
      min-height: 72px;
    }

    .item-main {
      min-width: 0;
    }

    .item-title {
      font-size: 15px;
      line-height: 1.3;
      font-weight: 650;
      color: #fff;
      word-break: break-word;
    }

    .item-meta {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
      word-break: break-word;
      white-space: pre-wrap;
      min-height: 18px;
    }

    .item-sub {
      margin-top: 3px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--soft);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .item-actions {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      margin-right: -4px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: rgba(255,255,255,0.72);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .icon-btn:hover {
      background: var(--ghost);
      color: #fff;
      transform: scale(1.03);
    }

    .icon-btn svg {
      width: 14px;
      height: 14px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .field {
      min-width: 0;
    }

    .field.is-invalid .label {
      color: #fff;
    }

    .label {
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--soft);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #090909;
      color: #fff;
      border-radius: 14px;
      outline: none;
      padding: 11px 12px;
      font-size: 14px;
      line-height: 1.35;
      transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
      -webkit-appearance: none;
      appearance: none;
      box-shadow: none;
      background-image: none;
    }

    .select {
      padding-right: 38px;
      cursor: pointer;
      background-repeat: no-repeat;
      background-position: right 13px center;
      background-size: 12px 8px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' fill='none' stroke='rgba(255,255,255,0.72)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    }

    .select::-ms-expand {
      display: none;
    }

    .field.is-invalid .input,
    .field.is-invalid .select,
    .field.is-invalid .textarea {
      border-color: var(--error-line);
      background-color: var(--error-bg);
      box-shadow: none;
    }

    .textarea {
      min-height: 140px;
      resize: vertical;
    }

    .input::placeholder,
    .textarea::placeholder {
      color: rgba(255,255,255,0.26);
    }

    .field-help {
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--soft);
    }

    .field-help.is-error {
      color: rgba(255,255,255,0.8);
    }

    .edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: 1px solid var(--line-strong);
      background: var(--ghost);
      color: #fff;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, opacity 120ms ease, transform 120ms ease;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.primary {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .btn.ghost {
      background: transparent;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: default;
      transform: none;
    }

    .agenda-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .agenda-strip {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      -webkit-overflow-scrolling: touch;
    }

    .day-btn {
      min-width: 60px;
      border: 1px solid var(--line);
      background: var(--ghost);
      color: rgba(255,255,255,0.74);
      border-radius: 14px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .day-btn.active {
      background: rgba(255,255,255,0.10);
      color: #fff;
      border-color: rgba(255,255,255,0.18);
    }

    .day-dow {
      font-size: 11px;
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }

    .day-num {
      font-size: 17px;
      line-height: 1;
      font-weight: 700;
    }

    .day-month {
      font-size: 10px;
      text-transform: lowercase;
      color: rgba(255,255,255,0.48);
    }

    .agenda-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .agenda-title {
      font-size: 18px;
      line-height: 1.15;
      font-weight: 700;
      color: #fff;
      text-transform: capitalize;
    }

    .agenda-sub {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .agenda-content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    .agenda-section {
      padding: 14px 16px 0;
    }

    .agenda-section:last-child {
      padding-bottom: 16px;
    }

    .section-label {
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--soft);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .agenda-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agenda-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--ghost);
      overflow: hidden;
      transition: opacity 160ms ease;
    }

    .agenda-card.is-dimmed {
      opacity: 0.5;
    }

    .agenda-card-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px;
    }

    .agenda-time {
      min-width: 52px;
      font-size: 12px;
      line-height: 1.2;
      color: rgba(255,255,255,0.86);
      font-weight: 700;
      padding-top: 1px;
    }

    .agenda-main {
      min-width: 0;
    }

    .agenda-card-title {
      font-size: 14px;
      line-height: 1.3;
      font-weight: 650;
      color: #fff;
      word-break: break-word;
    }

    .agenda-card-meta {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .chat-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      padding-bottom: 16px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scroll-padding-bottom: 24px;
    }

    .bubble {
      max-width: 88%;
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.clara {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.94);
    }

    .bubble.user {
      align-self: flex-end;
      background: #fff;
      color: #000;
    }

    .chat-options {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 88%;
      margin-top: -2px;
    }

    .option-btn {
      border: 1px solid var(--line);
      background: var(--ghost);
      color: #fff;
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .chat-meta {
      align-self: flex-start;
      font-size: 11px;
      line-height: 1.3;
      color: var(--soft);
      padding-left: 2px;
      margin-top: -3px;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--line);
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      background: rgba(0,0,0,0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .composer .composer-input {
      min-height: 44px;
      max-height: 132px;
      resize: none;
      overflow-y: auto;
      font-family: inherit;
    }

    .chat-thinking {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 5px;
      padding: 7px 11px;
      margin-top: 2px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
    }

    .chat-thinking.is-visible {
      display: inline-flex;
    }

    .thinking-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.38);
      animation: thinkingPulse 1.15s ease-in-out infinite;
    }

    .thinking-dot:nth-child(2) {
      animation-delay: 0.14s;
    }

    .thinking-dot:nth-child(3) {
      animation-delay: 0.28s;
    }

    @keyframes thinkingPulse {
      0%, 70%, 100% {
        opacity: 0.22;
        transform: scale(0.92);
      }
      35% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .panel-editor {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.01);
    }

    .panel-editor-head {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-shrink: 0;
    }

    .panel-editor-title-block {
      min-width: 0;
    }

    .panel-editor-title {
      font-size: 16px;
      line-height: 1.15;
      font-weight: 700;
      color: #fff;
      word-break: break-word;
    }

    .panel-editor-subtitle {
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .panel-editor-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .panel-editor-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--ghost);
      padding: 14px;
    }

    .panel-editor-actions {
      padding: 14px 18px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
      background: rgba(0,0,0,0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .panel-editor-note {
      font-size: 12px;
      color: var(--soft);
    }

    .edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-grid.single {
      grid-template-columns: 1fr;
    }

    .review-head {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .review-title-block {
      min-width: 0;
    }

    .review-title {
      font-size: 16px;
      line-height: 1.15;
      font-weight: 700;
      color: #fff;
    }

    .review-subtitle {
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .review-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .review-summary {
      border: 1px solid var(--line);
      background: var(--ghost);
      border-radius: 16px;
      padding: 12px 14px;
    }

    .review-summary-text {
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255,255,255,0.92);
      white-space: pre-wrap;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .review-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--ghost);
      overflow: hidden;
      transition: opacity 160ms ease, border-color 160ms ease;
    }

    .review-card.is-dimmed {
      opacity: 0.42;
    }

    .review-card.has-invalid {
      border-color: rgba(255,255,255,0.16);
    }

    .review-card.is-open {
      background: rgba(255,255,255,0.03);
    }

    .review-card-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
    }

    .review-badge {
      min-width: 74px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.84);
      font-size: 11px;
      line-height: 1;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 10px 10px;
      text-align: center;
    }

    .review-main {
      min-width: 0;
    }

    .review-card-title {
      font-size: 14px;
      line-height: 1.3;
      font-weight: 650;
      color: #fff;
      word-break: break-word;
    }

    .review-meta {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      word-break: break-word;
    }

    .review-signals {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 14px 12px;
    }

    .signal {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.78);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .signal.invalid {
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      color: #fff;
    }

    .signal.duplicate {
      color: rgba(255,255,255,0.68);
    }

    .review-edit {
      display: none;
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(255,255,255,0.015);
    }

    .review-card.is-open .review-edit {
      display: block;
    }

    .review-foot {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footer-note {
      font-size: 12px;
      color: var(--soft);
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 1000;
      background: rgba(0,0,0,0.76);
      backdrop-filter: blur(12px);
      padding: 18px;
    }

    .confirm-overlay.open {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-modal {
      width: min(420px, calc(100vw - 32px));
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(10,10,10,0.98);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      color: #fff;
    }

    .modal-subtitle {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--muted);
    }

    .confirm-content {
      padding: 0 20px 18px;
    }

    .confirm-item {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--ghost);
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.35;
      color: rgba(255,255,255,0.92);
      word-break: break-word;
    }

    .modal-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 1180px) {
      html, body {
        overflow: auto;
      }

      body {
        min-height: auto;
        height: auto;
      }

      .app {
        height: auto;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto;
      }

      .agenda-panel { grid-column: 1 / 3; grid-row: 1; min-height: 520px; }
      .tasks-panel { grid-column: 1; grid-row: 2; min-height: 340px; }
      .appointments-panel { grid-column: 2; grid-row: 2; min-height: 340px; }

      .right-stack {
        grid-column: 1 / 3;
        grid-row: 3;
        min-height: 740px;
      }

      .app.panel-edit-tasks .tasks-panel,
      .app.panel-edit-appointments .appointments-panel {
        min-height: 700px;
      }

      .app.panel-edit-notes .right-stack {
        min-height: 860px;
      }
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .agenda-panel,
      .tasks-panel,
      .appointments-panel,
      .right-stack {
        grid-column: auto;
        grid-row: auto;
      }

      .right-stack {
        min-height: 860px;
      }

      .edit-grid,
      .review-card-head {
        grid-template-columns: 1fr;
      }

      .agenda-card-row {
        grid-template-columns: 1fr;
      }

      .agenda-time {
        min-width: 0;
      }

      .review-foot,
      .modal-footer,
      .panel-editor-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .review-foot .btn,
      .modal-footer .btn,
      .panel-editor-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="version" id="version"></div>

  <div class="app" id="app">
    <section class="panel agenda-panel">
      <div class="panel-header">
        <div class="panel-title">Agenda</div>
        <div class="panel-meta" id="agendaMeta"></div>
      </div>
      <div class="panel-body">
        <div class="agenda-shell">
          <div class="agenda-strip" id="agendaStrip"></div>
          <div class="agenda-head">
            <div class="agenda-title" id="agendaTitle">Vandaag</div>
            <div class="agenda-sub" id="agendaSubtitle">Geen items</div>
          </div>
          <div class="agenda-content">
            <div class="agenda-section">
              <div class="section-label">Hele dag</div>
              <div class="agenda-list" id="agendaAllDay"></div>
            </div>
            <div class="agenda-section">
              <div class="section-label">Met tijd</div>
              <div class="agenda-list" id="agendaTimed"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel tasks-panel">
      <div class="panel-header">
        <div class="panel-title">Taken</div>
        <div class="panel-meta" id="tasksMeta"></div>
      </div>
      <div class="panel-body" id="tasks"></div>
    </section>

    <section class="panel appointments-panel">
      <div class="panel-header">
        <div class="panel-title">Afspraken</div>
        <div class="panel-meta" id="appointmentsMeta"></div>
      </div>
      <div class="panel-body" id="appointments"></div>
    </section>

    <section class="right-stack">
      <section class="stack-panel notes-panel">
        <div class="panel-header">
          <div class="panel-title">Notities</div>
          <div class="panel-meta" id="notesMeta"></div>
        </div>
        <div class="panel-body" id="notes"></div>
      </section>

      <section class="stack-panel chat-panel">
        <div class="panel-header">
          <div class="panel-title">Chat</div>
          <div class="panel-meta" id="chatModeMeta"></div>
        </div>
        <div class="panel-body">
          <div class="chat-shell">
            <div id="chatMessages" class="chat-messages">
              <div class="bubble clara">Hi. Ik ben Clara... Wat wil je me vertellen?</div>
              <div id="chatThinking" class="chat-thinking" aria-hidden="true">
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
                <span class="thinking-dot"></span>
              </div>
            </div>
            <div class="composer">
              <textarea id="chatInput" class="input composer-input" rows="1" placeholder="Typ hier…"></textarea>
              <button id="chatSend" class="btn primary">OK</button>
            </div>
          </div>
        </div>
      </section>

      <section class="review-pane" id="reviewPane">
        <div class="review-head">
          <div class="review-title-block">
            <div class="review-title">Controle</div>
            <div class="review-subtitle" id="reviewSubtitle">Controleer en pas aan waar nodig.</div>
          </div>
          <button class="btn ghost" id="reviewClose">Sluiten</button>
        </div>

        <div class="review-body">
          <div class="review-summary" id="reviewSummary">
            <div class="review-summary-text" id="reviewSummaryText"></div>
          </div>
          <div class="review-list" id="reviewItems"></div>
        </div>

        <div class="review-foot">
          <div class="footer-note" id="reviewFooterText">Nog niet opgeslagen.</div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn ghost" id="reviewCancelBtn">Annuleren</button>
            <button class="btn primary" id="reviewSaveBtn">Opslaan</button>
          </div>
        </div>
      </section>
    </section>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">Weet je het zeker?</div>
          <div class="modal-subtitle" id="confirmSubtitle">Dit item wordt verwijderd.</div>
        </div>
      </div>
      <div class="confirm-content">
        <div class="confirm-item" id="confirmItemTitle">Item</div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn ghost" id="confirmCancelBtn">Annuleren</button>
          <button class="btn primary" id="confirmOkBtn">Ja, verwijderen</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const AUTO_VERSION = new Date(document.lastModified).toLocaleString('nl-NL');
    document.getElementById('version').textContent = `live • v6.2 • ${AUTO_VERSION}`;

    let dashboardRawData = { agenda: [], tasks: [], notes: [] };
    let dashboardEditIndex = new Map();

    let selectedAgendaDayKey = null;

    let dashboardPanelEdit = null;

    let currentReviewData = null;
    let currentReviewInlineEditTempId = null;

    let pendingConfirmAction = null;

    function syncViewportHeight() {
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-height', `${vh}px`);
    }

    function getSessionId() {
      let id = localStorage.getItem('clara_session_id');
      if (!id) {
        id = `sess_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        localStorage.setItem('clara_session_id', id);
      }
      return id;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function editIconSvg() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 19l3.2-.7L17.8 8.7 15.3 6.2 5.7 15.8 5 19z"></path>
          <path d="M13.9 7.6l2.5 2.5"></path>
          <path d="M15.9 5.6l1-1c.6-.6 1.5-.6 2.1 0l.4.4c.6.6.6 1.5 0 2.1l-1 1"></path>
        </svg>
      `;
    }

    function deleteIconSvg() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 7l10 10"></path>
          <path d="M17 7L7 17"></path>
        </svg>
      `;
    }

    function formatLocalDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function startOfDay(date) {
      if (!date) return null;
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function parseDate(value) {
      if (!value) return null;

      const raw = String(value).trim();
      if (!raw) return null;
      const str = raw.toLowerCase();

      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
        const [y, m, d] = raw.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      if (/^\d{4}-\d{2}-\d{2}[ t]/i.test(raw)) {
        const datePart = raw.slice(0, 10);
        const [y, m, d] = datePart.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      if (/^\d{2}[\/.-]\d{2}[\/.-]\d{4}$/.test(raw)) {
        const parts = raw.split(/[\/.-]/).map(Number);
        return new Date(parts[2], parts[1] - 1, parts[0]);
      }

      const today = getTodayStart();

      if (str === 'vandaag') return today;
      if (str === 'morgen') {
        const d = new Date(today);
        d.setDate(d.getDate() + 1);
        return d;
      }
      if (str === 'overmorgen') {
        const d = new Date(today);
        d.setDate(d.getDate() + 2);
        return d;
      }

      const parsed = new Date(raw);
      if (Number.isNaN(parsed.getTime())) return null;
      return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());
    }

    function sameDay(a, b) {
      return a && b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function formatDayLong(date) {
      return new Intl.DateTimeFormat('nl-NL', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function formatDayShort(date) {
      return new Intl.DateTimeFormat('nl-NL', {
        weekday: 'short'
      }).format(date).replace('.', '').toLowerCase();
    }

    function formatMonthShort(date) {
      return new Intl.DateTimeFormat('nl-NL', {
        month: 'short'
      }).format(date).replace('.', '').toLowerCase();
    }

    function formatShortDate(dateStr, timeStr = '') {
      const date = parseDate(dateStr);
      if (!date) return 'nieuw';

      const today = getTodayStart();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);

      let label = new Intl.DateTimeFormat('nl-NL', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      }).format(date);

      if (sameDay(date, today)) label = 'vandaag';
      if (sameDay(date, tomorrow)) label = 'morgen';

      return timeStr ? `${label} ${timeStr}` : label;
    }

    function parseTimeToMinutes(value) {
      const str = String(value || '').trim().toLowerCase();
      if (!str) return null;

      const normalized = str.replace('.', ':');
      let match = normalized.match(/^(\d{1,2}):(\d{2})$/);
      if (match) {
        const h = Number(match[1]);
        const m = Number(match[2]);
        if (h >= 0 && h <= 23 && m >= 0 && m <= 59) return h * 60 + m;
      }

      match = normalized.match(/^(\d{1,2})$/);
      if (match) {
        const h = Number(match[1]);
        if (h >= 0 && h <= 23) return h * 60;
      }

      return null;
    }

    function formatMinutesAsTime(totalMinutes) {
      const normalized = ((totalMinutes % 1440) + 1440) % 1440;
      const hours = Math.floor(normalized / 60);
      const minutes = normalized % 60;
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function dedupeItems(items) {
      const seen = new Set();
      const result = [];

      for (const item of items || []) {
        const key = item.id
          ? `id:${item.id}`
          : [
              String(item.type || '').toLowerCase().trim(),
              String(item.title || '').toLowerCase().trim(),
              String(item.project || '').toLowerCase().trim(),
              String(item.date || '').toLowerCase().trim(),
              String(item.time || '').toLowerCase().trim(),
              String(item.summary || '').toLowerCase().trim()
            ].join('|');

        if (seen.has(key)) continue;
        seen.add(key);
        result.push(item);
      }

      return result;
    }

    function makeEditKey(item) {
      if (item?.id) return `id:${item.id}`;
      return [
        String(item?.type || '').toLowerCase().trim(),
        String(item?.title || '').toLowerCase().trim(),
        String(item?.project || '').toLowerCase().trim(),
        String(item?.date || '').toLowerCase().trim(),
        String(item?.time || '').toLowerCase().trim(),
        String(item?.summary || '').toLowerCase().trim()
      ].join('|');
    }

    function normalizeDashboardItem(item, sourceType = '') {
      const parsedDate = parseDate(item?.date);
      return {
        ...item,
        _sourceType: sourceType,
        _editKey: makeEditKey(item),
        _date: parsedDate,
        _dayStart: parsedDate ? startOfDay(parsedDate) : null,
        _timeMinutes: parseTimeToMinutes(item?.time)
      };
    }

    function sortByDateTime(a, b) {
      const aDay = a._dayStart ? a._dayStart.getTime() : Infinity;
      const bDay = b._dayStart ? b._dayStart.getTime() : Infinity;
      if (aDay !== bDay) return aDay - bDay;

      const aMinutes = a._timeMinutes;
      const bMinutes = b._timeMinutes;

      if (aMinutes === null && bMinutes === null) return 0;
      if (aMinutes === null) return -1;
      if (bMinutes === null) return 1;
      return aMinutes - bMinutes;
    }

    function buildDashboardEditIndex(data) {
      dashboardEditIndex = new Map();

      ['agenda', 'tasks', 'notes'].forEach(sourceType => {
        const arr = Array.isArray(data[sourceType]) ? data[sourceType] : [];
        arr.forEach(item => {
          const normalized = normalizeDashboardItem(item, sourceType);
          dashboardEditIndex.set(normalized._editKey, normalized);
        });
      });
    }

    function formatCompactMeta(item, fallbackSub = '') {
      const parts = [];

      if (item.date || item.time) parts.push(formatShortDate(item.date, item.time));
      else if (fallbackSub) parts.push(fallbackSub);

      if (item.project) parts.push(item.project);
      if (item.priority) parts.push(`prio ${item.priority}`);
      if (item.status && String(item.type || '').toLowerCase() !== 'notitie') parts.push(item.status);

      return parts.filter(Boolean).join(' • ');
    }

    function getMinimalMeta(item, kind = '') {
      const hasDate = !!item?.date;
      const hasTime = !!item?.time;

      if (kind === 'appointment') {
        if (hasDate && hasTime) return formatShortDate(item.date, item.time);
        if (hasDate) return formatShortDate(item.date, '');
        return '';
      }

      if (kind === 'task') {
        if (hasDate && hasTime) return formatShortDate(item.date, item.time);
        if (hasDate) return formatShortDate(item.date, '');
        if (hasTime) return item.time;
        return '';
      }

      if (kind === 'note') {
        return '';
      }

      return '';
    }

    function isReviewOpen() {
      return !!currentReviewData;
    }

    function syncAppModes() {
      const app = document.getElementById('app');
      const meta = document.getElementById('chatModeMeta');

      app.classList.remove('review-mode', 'panel-edit-tasks', 'panel-edit-appointments', 'panel-edit-notes');

      if (dashboardPanelEdit?.panel === 'tasks') app.classList.add('panel-edit-tasks');
      if (dashboardPanelEdit?.panel === 'appointments') app.classList.add('panel-edit-appointments');
      if (dashboardPanelEdit?.panel === 'notes') app.classList.add('panel-edit-notes');

      if (isReviewOpen()) {
        app.classList.add('review-mode');
        meta.textContent = 'review';
      } else {
        meta.textContent = '';
      }
    }

    function supportsInlineEdit(item) {
      const type = String(item?.type || '').toLowerCase();
      const sourceType = String(item?._sourceType || '').toLowerCase();
      return type === 'taak' || type === 'afspraak' || type === 'notitie' || sourceType === 'notes';
    }

    function cloneInlineDraftFromItem(item) {
      const sourceType = String(item?._sourceType || '').toLowerCase();
      const itemType = String(item?.type || '').toLowerCase();
      const isNote = sourceType === 'notes' || itemType === 'notitie';

      return {
        id: item.id || '',
        type: isNote ? 'notitie' : (item.type || 'taak'),
        title: item.title || '',
        project: item.project || '',
        summary: item.summary || '',
        status: isNote ? '' : (item.status || 'nieuw'),
        priority: isNote ? '' : (item.priority || 'middel'),
        date: isNote ? '' : (item.date || ''),
        end_date: isNote ? '' : (item.end_date || ''),
        time: isNote ? '' : (item.time || ''),
        source_text: item.source_text || ''
      };
    }

    function isDraftNote(draft) {
      return String(draft?.type || '').toLowerCase() === 'notitie';
    }

    function getPanelNameForItem(item) {
      const sourceType = String(item?._sourceType || '').toLowerCase();
      const type = String(item?.type || '').toLowerCase();

      if (sourceType === 'notes' || type === 'notitie') return 'notes';
      if (sourceType === 'agenda' || type === 'afspraak' || type === 'agenda') return 'appointments';
      return 'tasks';
    }

    function getPanelLabel(panelName) {
      if (panelName === 'notes') return 'Notitie';
      if (panelName === 'appointments') return 'Afspraak';
      return 'Taak';
    }

    function isPanelEditing(panelName) {
      return dashboardPanelEdit?.panel === panelName;
    }

    function openDashboardEdit(editKey) {
      const item = dashboardEditIndex.get(editKey);
      if (!item || !supportsInlineEdit(item)) return;

      const panelName = getPanelNameForItem(item);

      dashboardPanelEdit = {
        panel: panelName,
        editKey,
        draft: cloneInlineDraftFromItem(item),
        saving: false
      };

      renderAllPanels();

      requestAnimationFrame(() => {
        const panelBody = document.getElementById(panelName);
        if (panelBody) {
          panelBody.scrollTop = 0;
        }

        setTimeout(() => {
          const input = panelBody?.querySelector('.input, .select, .textarea');
          if (input) input.focus();
        }, 220);
      });
    }

    function closeDashboardInlineEdit() {
      dashboardPanelEdit = null;
      renderAllPanels();
    }

    function updateDashboardInlineField(field, value) {
      if (!dashboardPanelEdit?.draft) return;
      dashboardPanelEdit.draft[field] = value;

      if (field === 'type' && String(value).toLowerCase() === 'notitie') {
        dashboardPanelEdit.draft.status = '';
        dashboardPanelEdit.draft.priority = '';
        dashboardPanelEdit.draft.date = '';
        dashboardPanelEdit.draft.end_date = '';
        dashboardPanelEdit.draft.time = '';
      }
    }

    async function saveDashboardInlineEdit() {
      if (!dashboardPanelEdit?.editKey || !dashboardPanelEdit?.draft || dashboardPanelEdit?.saving) return;

      const originalItem = dashboardEditIndex.get(dashboardPanelEdit.editKey);
      if (!originalItem?.id) return;

      dashboardPanelEdit.saving = true;
      renderAllPanels();

      try {
        const payload = {
          action: 'update_item',
          session_id: getSessionId(),
          id: originalItem.id,
          ...dashboardPanelEdit.draft
        };

        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          handleChatApiError(result, 'Bijwerken ging mis.');
          dashboardPanelEdit.saving = false;
          renderAllPanels();
          return;
        }

    function getAgendaDaysWindow() {
      const days = [];
      const today = getTodayStart();
      for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function getCombinedAgendaLikeItems(data = {}) {
      const agendaItems = (Array.isArray(data.agenda) ? data.agenda : []).map(item => ({
        ...item,
        __sourceType: 'agenda'
      }));

      const taskItems = (Array.isArray(data.tasks) ? data.tasks : []).map(item => ({
        ...item,
        __sourceType: 'tasks'
      }));

      return dedupeItems([...agendaItems, ...taskItems])
        .map(item => {
          const sourceType = item.__sourceType || 'agenda';
          const clean = { ...item };
          delete clean.__sourceType;
          return normalizeDashboardItem(clean, sourceType);
        })
        .filter(item => item._dayStart)
        .sort(sortByDateTime);
    }

    function ensureSelectedAgendaDay(items) {
      const todayKey = formatLocalDateKey(getTodayStart());
      if (!selectedAgendaDayKey) selectedAgendaDayKey = todayKey;

      const validKeys = new Set(getAgendaDaysWindow().map(formatLocalDateKey));
      if (!validKeys.has(selectedAgendaDayKey)) selectedAgendaDayKey = todayKey;

      const selectedDate = parseDate(selectedAgendaDayKey);
      if (!selectedDate) selectedAgendaDayKey = todayKey;
    }

    function renderAgendaStrip() {
      const strip = document.getElementById('agendaStrip');
      const days = getAgendaDaysWindow();

      strip.innerHTML = days.map(day => {
        const key = formatLocalDateKey(day);
        const active = key === selectedAgendaDayKey ? 'active' : '';
        return `
          <button class="day-btn ${active}" type="button" onclick="selectAgendaDay('${key}')">
            <div class="day-dow">${escapeHtml(formatDayShort(day))}</div>
            <div class="day-num">${escapeHtml(String(day.getDate()))}</div>
            <div class="day-month">${escapeHtml(formatMonthShort(day))}</div>
          </button>
        `;
      }).join('');
    }

    function renderAgendaCard(item, timeLabel) {
      const isDimmed = !!dashboardPanelEdit && dashboardPanelEdit.editKey !== item._editKey;
      return `
        <div class="agenda-card ${isDimmed ? 'is-dimmed' : ''}">
          <div class="agenda-card-row">
            <div class="agenda-time">${escapeHtml(timeLabel)}</div>
            <div class="agenda-main">
              <div class="agenda-card-title">${escapeHtml(item.title || 'Zonder titel')}</div>
              <div class="agenda-card-meta">${escapeHtml(formatCompactMeta(item, item.summary || item.type || 'item'))}</div>
            </div>
            ${getActionButtonsHtml(item._editKey, item.title || 'Item')}
          </div>
        </div>
      `;
    }

    function renderAgenda(data = {}) {
      const items = getCombinedAgendaLikeItems(data);
      ensureSelectedAgendaDay(items);
      renderAgendaStrip();

      const selectedDate = parseDate(selectedAgendaDayKey) || getTodayStart();
      const selectedItems = items.filter(item => sameDay(item._dayStart, selectedDate));
      const allDayItems = selectedItems.filter(item => item._timeMinutes === null);
      const timedItems = selectedItems.filter(item => item._timeMinutes !== null).sort((a, b) => a._timeMinutes - b._timeMinutes);

      document.getElementById('agendaTitle').textContent = formatDayLong(selectedDate);
      document.getElementById('agendaSubtitle').textContent = `${selectedItems.length} item${selectedItems.length === 1 ? '' : 's'}`;
      document.getElementById('agendaMeta').textContent = `${selectedItems.length} item${selectedItems.length === 1 ? '' : 's'}`;

      const allDayEl = document.getElementById('agendaAllDay');
      const timedEl = document.getElementById('agendaTimed');

      if (!allDayItems.length) {
        allDayEl.innerHTML = `<div class="empty" style="padding:0; color:rgba(255,255,255,0.22);">Geen hele-dag items</div>`;
      } else {
        allDayEl.innerHTML = allDayItems.map(item => renderAgendaCard(item, 'hele dag')).join('');
      }

      if (!timedItems.length) {
        timedEl.innerHTML = `<div class="empty" style="padding:0; color:rgba(255,255,255,0.22);">Geen tijdgebonden items</div>`;
      } else {
        timedEl.innerHTML = timedItems.map(item => renderAgendaCard(item, item.time || formatMinutesAsTime(item._timeMinutes || 0))).join('');
      }
    }

    function renderTasks(data = {}) {

      renderAgenda(dashboardRawData);

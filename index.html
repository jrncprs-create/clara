<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clara</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      padding: 14px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 30%),
        #000;
    }

    .panel-body,
    .chat-messages,
    .chat-input,
    .review-modal-content,
    .review-items,
    .review-textarea,
    .review-input,
    .review-select,
    * {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .panel-body::-webkit-scrollbar,
    .chat-messages::-webkit-scrollbar,
    .chat-input::-webkit-scrollbar,
    .review-modal-content::-webkit-scrollbar,
    .review-items::-webkit-scrollbar,
    .review-textarea::-webkit-scrollbar,
    .review-input::-webkit-scrollbar,
    .review-select::-webkit-scrollbar,
    *::-webkit-scrollbar {
      width: 0 !important;
      height: 0 !important;
      display: none !important;
      background: transparent !important;
    }

    .version {
      position: fixed;
      top: 10px;
      right: 14px;
      font-size: 11px;
      opacity: 0.45;
      letter-spacing: 0.04em;
      z-index: 20;
      pointer-events: none;
    }

    .app {
      width: 100%;
      height: calc(100vh - 28px);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
    }

    .panel {
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
      min-height: 0;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      height: 44px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.92);
    }

    .panel-body {
      height: calc(100% - 44px);
      overflow: auto;
      min-height: 0;
      position: relative;
    }

    .agenda-panel { grid-column: 1; grid-row: 1 / 3; }
    .tasks-panel { grid-column: 2; grid-row: 1; }
    .appointments-panel { grid-column: 2; grid-row: 2; }
    .chat-panel { grid-column: 3; grid-row: 1; }
    .notes-panel { grid-column: 3; grid-row: 2; }

    .agenda-list,
    .flat-list {
      display: flex;
      flex-direction: column;
    }

    .agenda-day,
    .flat-item {
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .agenda-day:last-child,
    .flat-item:last-child {
      border-bottom: none;
    }

    .agenda-date,
    .flat-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      color: rgba(255,255,255,0.96);
      text-transform: capitalize;
    }

    .agenda-date {
      margin-bottom: 12px;
    }

    .agenda-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .agenda-item,
    .flat-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .agenda-item-title,
    .flat-main {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
    }

    .agenda-item-meta,
    .flat-meta,
    .flat-sub {
      font-size: 13px;
      line-height: 1.3;
    }

    .agenda-item-meta,
    .flat-meta {
      color: rgba(255,255,255,0.55);
    }

    .flat-sub {
      color: rgba(255,255,255,0.40);
      margin-top: 2px;
    }

    .agenda-empty,
    .flat-empty,
    .empty {
      color: rgba(255,255,255,0.28);
      font-size: 14px;
    }

    .empty {
      padding: 18px;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .chat-messages {
      flex: 1;
      padding: 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      position: relative;
    }

    .chat-bubble {
      max-width: 88%;
      padding: 11px 13px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-bubble.clara {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.92);
    }

    .chat-bubble.user {
      align-self: flex-end;
      background: #fff;
      color: #000;
    }

    .chat-inputbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .chat-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #111;
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    .chat-input::placeholder {
      color: rgba(255,255,255,0.35);
    }

    .chat-send {
      background: #fff;
      color: #000;
      border: none;
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .chat-send:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .review-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: none;
      padding: 22px;
    }

    .review-overlay.open {
      display: block;
    }

    .review-modal {
      width: min(1180px, calc(100vw - 44px));
      height: min(90vh, 980px);
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      background: rgba(10,10,10,0.96);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .review-modal-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }

    .review-modal-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .review-modal-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.50);
      margin-top: 4px;
    }

    .review-close {
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .review-modal-content {
      flex: 1;
      overflow: auto;
      padding: 18px;
      min-height: 0;
    }

    .review-summary-box {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      background: rgba(255,255,255,0.02);
      padding: 14px;
      margin-bottom: 16px;
    }

    .review-summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.50);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .review-summary-text {
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255,255,255,0.92);
      white-space: pre-wrap;
    }

    .review-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .review-item {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      background: rgba(255,255,255,0.02);
      padding: 14px;
    }

    .review-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .review-item-index {
      font-size: 12px;
      color: rgba(255,255,255,0.46);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .review-delete {
      border: 1px solid rgba(255,255,255,0.10);
      background: transparent;
      color: rgba(255,255,255,0.78);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .review-grid {
      display: grid;
      grid-template-columns: 1.1fr 1.3fr 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .review-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .review-field.span-2 {
      grid-column: span 2;
    }

    .review-field.span-3 {
      grid-column: span 3;
    }

    .review-field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.46);
      font-weight: 700;
    }

    .review-input,
    .review-select,
    .review-textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: #111;
      color: #fff;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      padding: 11px 12px;
      font-family: inherit;
    }

    .review-textarea {
      min-height: 84px;
      resize: vertical;
    }

    .review-source {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.54);
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .review-modal-footer {
      padding: 16px 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .review-footer-left {
      font-size: 13px;
      color: rgba(255,255,255,0.48);
    }

    .review-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .review-btn {
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .review-btn.primary {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .review-btn.secondary {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .review-btn.ghost {
      background: transparent;
      color: rgba(255,255,255,0.80);
    }

    @media (max-width: 1280px) {
      .review-grid {
        grid-template-columns: 1fr 1fr;
      }

      .review-field.span-2,
      .review-field.span-3 {
        grid-column: span 2;
      }
    }

    @media (max-width: 1100px) {
      html, body {
        overflow: auto;
      }

      .app {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }

      .agenda-panel,
      .tasks-panel,
      .appointments-panel,
      .chat-panel,
      .notes-panel {
        grid-column: auto;
        grid-row: auto;
        min-height: 340px;
      }
    }

    @media (max-width: 760px) {
      .review-overlay {
        padding: 10px;
      }

      .review-modal {
        width: 100%;
        height: 92vh;
      }

      .review-grid {
        grid-template-columns: 1fr;
      }

      .review-field.span-2,
      .review-field.span-3 {
        grid-column: span 1;
      }

      .review-modal-footer {
        flex-direction: column;
        align-items: stretch;
      }

      .review-actions {
        width: 100%;
      }

      .review-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="version" id="version"></div>

  <div class="app">
    <div class="panel agenda-panel">
      <div class="panel-header">
        <div class="panel-title">Agenda</div>
      </div>
      <div class="panel-body" id="agenda"></div>
    </div>

    <div class="panel tasks-panel">
      <div class="panel-header">
        <div class="panel-title">Taken</div>
      </div>
      <div class="panel-body" id="tasks"></div>
    </div>

    <div class="panel appointments-panel">
      <div class="panel-header">
        <div class="panel-title">Afspraken</div>
      </div>
      <div class="panel-body" id="appointments"></div>
    </div>

    <div class="panel chat-panel">
      <div class="panel-header">
        <div class="panel-title">Chat</div>
      </div>
      <div class="panel-body">
        <div class="chat-shell">
          <div id="chatMessages" class="chat-messages">
            <div class="chat-bubble clara">Zeg iets als: morgen werkplaats opruimen, call met Sam morgen 14:00, of notitie voor LaLampe.</div>
          </div>
          <div class="chat-inputbar">
            <input id="chatInput" class="chat-input" placeholder="Typ of spreek in..." />
            <button id="chatSend" class="chat-send">OK</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel notes-panel">
      <div class="panel-header">
        <div class="panel-title">Notities</div>
      </div>
      <div class="panel-body" id="notes"></div>
    </div>
  </div>

  <div class="review-overlay" id="reviewOverlay">
    <div class="review-modal">
      <div class="review-modal-header">
        <div>
          <div class="review-modal-title">Controleer voor opslaan</div>
          <div class="review-modal-subtitle" id="reviewSubtitle">Pas alles aan waar nodig.</div>
        </div>
        <button class="review-close" id="reviewClose">Sluiten</button>
      </div>

      <div class="review-modal-content">
        <div class="review-summary-box">
          <div class="review-summary-label">Samenvatting</div>
          <div class="review-summary-text" id="reviewSummaryText"></div>
        </div>

        <div class="review-items" id="reviewItems"></div>
      </div>

      <div class="review-modal-footer">
        <div class="review-footer-left" id="reviewFooterText">Nog niet opgeslagen.</div>
        <div class="review-actions">
          <button class="review-btn ghost" id="reviewCancelBtn">Annuleren</button>
          <button class="review-btn secondary" id="reviewRefreshBtn">Alleen sluiten</button>
          <button class="review-btn primary" id="reviewSaveBtn">Klopt, opslaan</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const VERSION = 'v2.6';
    document.getElementById('version').textContent = `${VERSION} • ${new Date().toLocaleString('nl-NL')}`;

    let currentReviewData = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function getDays(count = 7) {
      const days = [];
      const today = getTodayStart();

      for (let i = 0; i < count; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
      }

      return days;
    }

    function parseDate(value) {
      if (!value) return null;

      const str = String(value).trim().toLowerCase();

      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      if (/^\d{4}-\d{2}-\d{2}t/.test(str)) {
        const parsedIso = new Date(value);
        return Number.isNaN(parsedIso.getTime()) ? null : parsedIso;
      }

      const today = getTodayStart();

      if (str === 'vandaag') return today;

      if (str === 'morgen') {
        const d = new Date(today);
        d.setDate(d.getDate() + 1);
        return d;
      }

      if (str === 'overmorgen') {
        const d = new Date(today);
        d.setDate(d.getDate() + 2);
        return d;
      }

      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function sameDay(a, b) {
      return a && b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function formatDayLong(date) {
      return new Intl.DateTimeFormat('nl-NL', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function formatShortDate(dateStr, timeStr = '') {
      const date = parseDate(dateStr);
      if (!date) return 'nieuw';

      const today = getTodayStart();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);

      let label = new Intl.DateTimeFormat('nl-NL', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      }).format(date);

      if (sameDay(date, today)) label = 'vandaag';
      if (sameDay(date, tomorrow)) label = 'morgen';

      return timeStr ? `${label} ${timeStr}` : label;
    }

    function dedupeItems(items) {
      const seen = new Set();
      const result = [];

      for (const item of items || []) {
        const key = item.id
          ? `id:${item.id}`
          : [
              String(item.type || '').toLowerCase().trim(),
              String(item.title || '').toLowerCase().trim(),
              String(item.project || '').toLowerCase().trim(),
              String(item.date || '').toLowerCase().trim(),
              String(item.time || '').toLowerCase().trim(),
              String(item.summary || '').toLowerCase().trim()
            ].join('|');

        if (seen.has(key)) continue;
        seen.add(key);
        result.push(item);
      }

      return result;
    }

    function renderAgenda(data = {}) {
      const agendaEl = document.getElementById('agenda');
      const agenda = dedupeItems(Array.isArray(data.agenda) ? data.agenda : []);

      const items = agenda
        .map(item => ({ ...item, _date: parseDate(item.date) }))
        .filter(item => item._date);

      const days = getDays(7);

      agendaEl.innerHTML = `
        <div class="agenda-list">
          ${days.map(day => {
            const dayItems = items
              .filter(item => sameDay(item._date, day))
              .sort((a, b) => `${a.time || ''}`.localeCompare(`${b.time || ''}`));

            return `
              <div class="agenda-day">
                <div class="agenda-date">${escapeHtml(formatDayLong(day))}</div>
                <div class="agenda-items">
                  ${
                    dayItems.length
                      ? dayItems.map(item => `
                        <div class="agenda-item">
                          <div class="agenda-item-title">${escapeHtml(item.title || 'Zonder titel')}</div>
                          <div class="agenda-item-meta">${escapeHtml(item.time || 'hele dag')}</div>
                        </div>
                      `).join('')
                      : `<div class="agenda-empty">geen afspraken</div>`
                  }
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderTasks(data = {}) {
      const tasksEl = document.getElementById('tasks');
      const tasks = dedupeItems(Array.isArray(data.tasks) ? data.tasks : []);

      if (!tasks.length) {
        tasksEl.innerHTML = `<div class="empty">Geen taken</div>`;
        return;
      }

      tasksEl.innerHTML = `
        <div class="flat-list">
          ${tasks.map(item => `
            <div class="flat-item">
              <div class="flat-content">
                <div class="flat-main">${escapeHtml(item.title || 'Zonder titel')}</div>
                ${item.project ? `<div class="flat-meta">${escapeHtml(item.project)}</div>` : ''}
                <div class="flat-sub">${escapeHtml(formatShortDate(item.date, item.time))}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderNotes(data = {}) {
      const notesEl = document.getElementById('notes');
      const notes = dedupeItems(Array.isArray(data.notes) ? data.notes : []);

      if (!notes.length) {
        notesEl.innerHTML = `<div class="empty">Geen notities</div>`;
        return;
      }

      notesEl.innerHTML = `
        <div class="flat-list">
          ${notes.map(item => `
            <div class="flat-item">
              <div class="flat-content">
                <div class="flat-main">${escapeHtml(item.title || 'Zonder titel')}</div>
                ${item.project ? `<div class="flat-meta">${escapeHtml(item.project)}</div>` : ''}
                <div class="flat-sub">${escapeHtml(item.summary || '')}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderAppointments(data = {}) {
      const appointmentsEl = document.getElementById('appointments');
      const agenda = dedupeItems(Array.isArray(data.agenda) ? data.agenda : [])
        .filter(item => ['afspraak', 'agenda'].includes((item.type || '').toLowerCase()));

      if (!agenda.length) {
        appointmentsEl.innerHTML = `<div class="empty">Geen afspraken</div>`;
        return;
      }

      appointmentsEl.innerHTML = `
        <div class="flat-list">
          ${agenda.map(item => `
            <div class="flat-item">
              <div class="flat-content">
                <div class="flat-main">${escapeHtml(item.title || 'Zonder titel')}</div>
                <div class="flat-meta">${escapeHtml(formatShortDate(item.date, item.time))}</div>
                ${item.summary ? `<div class="flat-sub">${escapeHtml(item.summary)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function addChatBubble(text, sender) {
      const chatMessages = document.getElementById('chatMessages');
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${sender}`;
      bubble.textContent = text;
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function openReviewModal(reviewData) {
      currentReviewData = reviewData;

      const overlay = document.getElementById('reviewOverlay');
      const summaryText = document.getElementById('reviewSummaryText');
      const subtitle = document.getElementById('reviewSubtitle');
      const footerText = document.getElementById('reviewFooterText');

      summaryText.textContent = reviewData?.review?.summary || '';
      subtitle.textContent = reviewData?.reply || 'Controleer en pas aan waar nodig.';
      footerText.textContent = `${(reviewData?.review?.items || []).length} item(s). Nog niet opgeslagen.`;

      renderReviewItems();
      overlay.classList.add('open');
    }

    function closeReviewModal() {
      document.getElementById('reviewOverlay').classList.remove('open');
    }

    function renderReviewItems() {
      const wrap = document.getElementById('reviewItems');
      const items = currentReviewData?.review?.items || [];

      if (!items.length) {
        wrap.innerHTML = `<div class="empty">Geen items om te controleren.</div>`;
        return;
      }

      wrap.innerHTML = items.map((item, index) => `
        <div class="review-item" data-temp-id="${escapeHtml(item.temp_id || `item_${index + 1}`)}">
          <div class="review-item-top">
            <div class="review-item-index">Item ${index + 1}</div>
            <button class="review-delete" type="button" onclick="deleteReviewItem('${escapeHtml(item.temp_id || `item_${index + 1}`)}')">Verwijderen</button>
          </div>

          <div class="review-grid">
            <div class="review-field">
              <label>Type</label>
              <select class="review-select" data-field="type">
                ${['taak', 'afspraak', 'notitie', 'idee', 'project', 'beslissing'].map(type => `
                  <option value="${type}" ${item.type === type ? 'selected' : ''}>${type}</option>
                `).join('')}
              </select>
            </div>

            <div class="review-field span-2">
              <label>Titel</label>
              <input class="review-input" data-field="title" value="${escapeHtml(item.title || '')}" />
            </div>

            <div class="review-field">
              <label>Project</label>
              <input class="review-input" data-field="project" value="${escapeHtml(item.project || '')}" />
            </div>

            <div class="review-field">
              <label>Status</label>
              <input class="review-input" data-field="status" value="${escapeHtml(item.status || '')}" />
            </div>

            <div class="review-field span-3">
              <label>Samenvatting</label>
              <textarea class="review-textarea" data-field="summary">${escapeHtml(item.summary || '')}</textarea>
            </div>

            <div class="review-field">
              <label>Datum</label>
              <input class="review-input" data-field="date" value="${escapeHtml(item.date || '')}" placeholder="2026-03-30" />
            </div>

            <div class="review-field">
              <label>Eindtijd / einddatum</label>
              <input class="review-input" data-field="end_date" value="${escapeHtml(item.end_date || '')}" />
            </div>

            <div class="review-field">
              <label>Tijd</label>
              <input class="review-input" data-field="time" value="${escapeHtml(item.time || '')}" placeholder="14:00" />
            </div>

            <div class="review-field">
              <label>Prioriteit</label>
              <select class="review-select" data-field="priority">
                ${['hoog', 'middel', 'laag', ''].map(p => `
                  <option value="${p}" ${String(item.priority || '') === p ? 'selected' : ''}>${p || '-'}</option>
                `).join('')}
              </select>
            </div>
          </div>

          <div class="review-source">${escapeHtml(item.source_text || '')}</div>
        </div>
      `).join('');
    }

    function deleteReviewItem(tempId) {
      if (!currentReviewData?.review?.items) return;
      currentReviewData.review.items = currentReviewData.review.items.filter(item => item.temp_id !== tempId);
      document.getElementById('reviewFooterText').textContent = `${currentReviewData.review.items.length} item(s). Nog niet opgeslagen.`;
      renderReviewItems();
    }

    window.deleteReviewItem = deleteReviewItem;

    function collectReviewItemsFromForm() {
      const itemEls = Array.from(document.querySelectorAll('.review-item'));

      return itemEls.map((el, index) => {
        const tempId = el.getAttribute('data-temp-id') || `item_${index + 1}`;
        const getVal = (field) => {
          const input = el.querySelector(`[data-field="${field}"]`);
          return input ? input.value.trim() : '';
        };

        const original = (currentReviewData?.review?.items || []).find(x => x.temp_id === tempId) || {};

        return {
          temp_id: tempId,
          type: getVal('type') || original.type || 'notitie',
          title: getVal('title') || original.title || '',
          summary: getVal('summary') || original.summary || '',
          project: getVal('project') || original.project || '',
          date: getVal('date') || original.date || '',
          end_date: getVal('end_date') || original.end_date || '',
          time: getVal('time') || original.time || '',
          status: getVal('status') || original.status || 'nieuw',
          priority: getVal('priority') || original.priority || 'middel',
          source_text: original.source_text || ''
        };
      });
    }

    async function saveReviewedItems() {
      const saveBtn = document.getElementById('reviewSaveBtn');
      const footerText = document.getElementById('reviewFooterText');
      const items = collectReviewItemsFromForm();

      if (!items.length) {
        footerText.textContent = 'Geen items om op te slaan.';
        return;
      }

      saveBtn.disabled = true;
      footerText.textContent = 'Bezig met opslaan...';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'confirm_review',
            items
          })
        });

        const result = await response.json();

        if (!response.ok) {
          footerText.textContent = 'Opslaan ging mis.';
          addChatBubble('Opslaan ging mis.', 'clara');
          return;
        }

        closeReviewModal();
        addChatBubble(result.reply || 'Opgeslagen.', 'clara');
        await loadDashboard();
      } catch (error) {
        footerText.textContent = 'Verbinding mislukt.';
        addChatBubble('Verbinding mislukt.', 'clara');
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const button = document.getElementById('chatSend');
      const text = input.value.trim();

      if (!text) return;

      addChatBubble(text, 'user');
      input.value = '';
      button.disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const result = await response.json();

        if (!response.ok) {
          addChatBubble('Opslaan ging mis.', 'clara');
          return;
        }

        if (result.mode === 'review' && result.review) {
          openReviewModal(result);
          addChatBubble(result.reply || 'Controleer dit even.', 'clara');
          return;
        }

        addChatBubble(result.reply || 'Opgeslagen.', 'clara');
        await loadDashboard();
      } catch (error) {
        addChatBubble('Verbinding mislukt.', 'clara');
      } finally {
        button.disabled = false;
      }
    }

    document.getElementById('chatSend').addEventListener('click', sendChat);

    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendChat();
    });

    document.getElementById('reviewClose').addEventListener('click', closeReviewModal);
    document.getElementById('reviewCancelBtn').addEventListener('click', closeReviewModal);
    document.getElementById('reviewRefreshBtn').addEventListener('click', closeReviewModal);
    document.getElementById('reviewSaveBtn').addEventListener('click', saveReviewedItems);

    document.getElementById('reviewOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'reviewOverlay') closeReviewModal();
    });

    async function loadDashboard() {
      try {
        const response = await fetch('/api/dashboard');
        const data = await response.json();

        renderAgenda(data);
        renderTasks(data);
        renderNotes(data);
        renderAppointments(data);
      } catch (error) {
        renderAgenda({});
        renderTasks({});
        renderNotes({});
        renderAppointments({});
      }
    }

    loadDashboard();
  </script>
</body>
</html>

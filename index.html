<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clara</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
}

body {
  padding: 14px;
}

.app {
  width: 100%;
  height: calc(100vh - 28px);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto 1fr;
  gap: 14px;
}

.panel {
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 22px;
  background: rgba(255,255,255,0.02);
  overflow: hidden;
  min-height: 0;
}

.panel-header {
  height: 44px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.panel-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
}

.panel-body {
  height: calc(100% - 44px);
  overflow: auto;
}

/* layout */
.agenda-panel { grid-column: 1; grid-row: 1 / 3; }
.tasks-panel { grid-column: 2; grid-row: 1; }
.notes-panel { grid-column: 3; grid-row: 1; }
.appointments-panel { grid-column: 2; grid-row: 2; }
.chat-panel { grid-column: 3; grid-row: 2; }

/* agenda */
.agenda-day {
  padding: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.agenda-date {
  font-weight: 700;
  margin-bottom: 10px;
}

.agenda-empty {
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}

/* cards */
.card {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 14px;
}

.card-title { font-weight: 600; }
.card-meta { font-size: 13px; opacity: 0.6; }

/* chat */
.chat-wrap {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.chat-messages {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

.chat-bubble {
  margin-bottom: 8px;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}

.clara { background: rgba(255,255,255,0.08); }
.user { background: #fff; color: #000; }

.chat-inputbar {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.chat-input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #fff;
}

.chat-send {
  background: #fff;
  color: #000;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

<!-- TIME TABLE -->
<div class="panel agenda-panel">
  <div class="panel-header">
    <div class="panel-title">Time table</div>
  </div>
  <div class="panel-body" id="agenda"></div>
</div>

<!-- TODOS -->
<div class="panel tasks-panel">
  <div class="panel-header">
    <div class="panel-title">ToDo’s</div>
  </div>
  <div class="panel-body" id="tasks"></div>
</div>

<!-- NOTES -->
<div class="panel notes-panel">
  <div class="panel-header">
    <div class="panel-title">Notities</div>
  </div>
  <div class="panel-body" id="notes"></div>
</div>

<!-- APPOINTMENTS -->
<div class="panel appointments-panel">
  <div class="panel-header">
    <div class="panel-title">Afspraken</div>
  </div>
  <div class="panel-body" id="appointments"></div>
</div>

<!-- CHAT -->
<div class="panel chat-panel">
  <div class="panel-header">
    <div class="panel-title">Chat</div>
  </div>
  <div class="panel-body">
    <div class="chat-wrap">
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-inputbar">
        <input id="chatInput" class="chat-input" placeholder="Typ..." />
        <button id="chatSend" class="chat-send">OK</button>
      </div>
    </div>
  </div>
</div>

</div>

<script>
function getDays() {
  const days = []
  const today = new Date()
  for (let i = 0; i < 7; i++) {
    const d = new Date(today)
    d.setDate(today.getDate() + i)
    days.push(d.toLocaleDateString('nl-NL', { weekday:'long', day:'numeric', month:'long' }))
  }
  return days
}

function renderAgenda() {
  const el = document.getElementById('agenda')
  el.innerHTML = getDays().map(d => `
    <div class="agenda-day">
      <div class="agenda-date">${d}</div>
      <div class="agenda-empty">geen items</div>
    </div>
  `).join('')
}

function chat(text) {
  const el = document.getElementById('chatMessages')
  el.innerHTML += `<div class="chat-bubble user">${text}</div>`
  setTimeout(() => {
    el.innerHTML += `<div class="chat-bubble clara">Opgeslagen.</div>`
    el.scrollTop = el.scrollHeight
  }, 400)
}

document.getElementById('chatSend').onclick = () => {
  const input = document.getElementById('chatInput')
  chat(input.value)
  input.value = ''
}

renderAgenda()
</script>

</body>
</html>

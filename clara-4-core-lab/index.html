<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clara 4 Core Lab v0.14.22</title>
<link rel="stylesheet" href="./style.css">
<script src="./app.js" defer></script>
</head>
<body>
<main class="app">
  <section class="col chat">
    <div class="head">
      <div class="brand"><span class="mark">✦</span><span class="title">Clara</span></div>
      <span class="tag">Lab state</span>
    </div>
    <div class="body">
      <div class="log" id="chatLog">
        <div class="msg assistant"><div class="msg-body">Clara Core Lab — hier verschijnt zo een korte melding na de eerste Projectbrain-start.</div></div>
      </div>
      <div class="composer">
        <div class="composer-shell">
          <textarea id="input" placeholder="Stel een vraag"></textarea>
          <div class="controls"><button class="send" id="analyzeBtn">↑</button></div>
        </div>
      </div>
    </div>
  </section>

  <section class="col agenda">
    <div class="head agenda-head">
      <div class="small-title">Agenda</div>
      <div class="agenda-tab-group" id="agendaHeadTabs" aria-label="Agenda-weergave"></div>
    </div>
    <div class="body agenda-body" id="agendaCol"><p class="empty">Analyseer input om de dagagenda te vullen.</p></div>
  </section>

  <section class="clock">
    <div class="clock-widget">
      <div class="clock-digits"><span id="clockHour">--</span><span id="clockMinute">--</span></div>
      <div class="clock-meta">
        <strong id="clockWeekday">--</strong>
        <span id="clockDate">--</span>
        <span id="clockYear">----</span>
        <div class="weather"><span>Amsterdam</span><span class="weather-icon">☁</span></div>
      </div>
    </div>
    <div class="nav"><button id="agendaPrevBtn">←</button><button id="agendaNextBtn">→</button></div>
  </section>

  <section class="col">
    <div class="head"><div><div class="small-title">Aandacht</div><div class="sub">afvinken · aanpassen · verwijderen</div></div></div>
    <div class="body"><div class="stack" id="attentionCol"><p class="empty">Geen losse aandachtspunten.</p></div></div>
  </section>

  <section class="col regie-column">
    <div class="head"><div><div class="small-title">Dagregie</div><div class="sub">check · doorschuiven · context</div></div></div>
    <div class="body"><div id="endPromptHost" class="end-prompt-host" aria-live="polite"></div><div class="stack" id="regieCol"></div></div>
  </section>
</main>
</body>
</html>

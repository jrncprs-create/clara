<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clara 4 Core Lab v0.14.35</title>
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="./layout-target.css">
<script src="./app.js" defer></script>
<script src="./startup-boost.js" defer></script>
</head>
<body>
<div class="startup-overlay hidden" id="startupOverlay" role="dialog" aria-modal="true" aria-labelledby="startupOverlayTitle">
  <div class="startup-overlay__backdrop" data-startup-overlay-close></div>
  <div class="startup-overlay__panel">
    <div class="startup-overlay__head">
      <div class="brand"><span class="mark">✦</span><span class="title" id="startupOverlayTitle">Startvoorstellen</span></div>
      <button type="button" class="plain" data-startup-overlay-close aria-label="Sluit">×</button>
    </div>
    <div class="startup-overlay__body">
      <p class="startup-overlay__intro" id="startupOverlayIntro">—</p>
      <div class="startup-overlay__list" id="startupOverlayList"></div>
    </div>
    <div class="startup-overlay__foot">
      <button type="button" class="startup-overlay__btn" data-startup-overlay-action="accept-all" id="startupOverlayAcceptAll">Alles accepteren</button>
      <button type="button" class="startup-overlay__btn primary" data-startup-overlay-action="start-empty">Start zonder voorstellen</button>
    </div>
  </div>
</div>

<div class="projectplan-overlay hidden" id="projectPlanOverlay" role="dialog" aria-modal="true" aria-labelledby="projectPlanOverlayTitle">
  <div class="projectplan-overlay__backdrop" data-projectplan-close></div>
  <div class="projectplan-overlay__panel">
    <div class="projectplan-overlay__head">
      <div class="brand"><span class="mark">✦</span><span class="title" id="projectPlanOverlayTitle">Projectplan</span></div>
      <button type="button" class="plain" data-projectplan-close aria-label="Sluit">×</button>
    </div>
    <div class="projectplan-overlay__body" id="projectPlanOverlayBody"></div>
    <div class="projectplan-overlay__foot">
      <button type="button" class="projectplan-overlay__btn" data-projectplan-action="plan-week">Plan deze week</button>
      <button type="button" class="projectplan-overlay__btn" data-projectplan-action="save">Opslaan</button>
      <button type="button" class="projectplan-overlay__btn primary" data-projectplan-action="close">Sluiten</button>
    </div>
  </div>
</div>
<header class="cockpit-header" aria-label="Clara cockpit header">
  <div class="cockpit-top">
    <div class="cockpit-logo" aria-hidden="true">
      <svg viewBox="0 0 64 64" class="cockpit-logo-svg">
        <path d="M32 6v52M6 32h52M14 14l36 36M50 14L14 50" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="cockpit-time">
      <div class="cockpit-digits"><span id="clockHour">--</span><span class="cockpit-colon">:</span><span id="clockMinute">--</span></div>
    </div>
    <div class="cockpit-weather" aria-label="Weerverwachting">
      <div class="weather-strip" id="weatherStrip">
        <div class="wcol"><div class="wicon" data-wicon></div><div class="wtime">Now</div><div class="wtemp" data-wtemp>—</div></div>
        <div class="wcol"><div class="wicon" data-wicon></div><div class="wtime" data-wtime>21:00</div><div class="wtemp" data-wtemp>—</div></div>
        <div class="wcol"><div class="wicon" data-wicon></div><div class="wtime" data-wtime>22:00</div><div class="wtemp" data-wtemp>—</div></div>
        <div class="wcol"><div class="wicon" data-wicon></div><div class="wtime" data-wtime>23:00</div><div class="wtemp" data-wtemp>—</div></div>
      </div>
    </div>
  </div>
  <div class="cockpit-bottom">
    <div class="cockpit-date">
      <div class="cockpit-date-line" id="agendaDateHeader">—</div>
    </div>
    <div class="cockpit-tabs" id="agendaHeadTabs" aria-label="Agenda-weergave"></div>
  </div>
</header>
<main class="app">
  <div class="left-stack">
    <section class="clock clock-nav-only" aria-label="Dag navigatie">
      <div class="nav"><button id="agendaPrevBtn">←</button><button id="agendaNextBtn">→</button></div>
    </section>
    <section class="col chat">
      <div class="head">
        <div class="brand"><span class="mark">✦</span><span class="title">Clara</span></div>
        <span class="tag">Planning</span>
      </div>
      <div class="body">
        <div class="log" id="chatLog">
          <div class="msg assistant"><div class="msg-body">Clara Core Lab — ik help je je dag scherp en rustig indelen.</div></div>
        </div>
        <div class="composer">
          <div class="composer-shell">
            <textarea id="input" placeholder="Stel een vraag"></textarea>
            <div class="controls"><button class="send" id="analyzeBtn">↑</button></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <section class="col agenda">
    <div class="body agenda-body" id="agendaCol"><p class="empty">Analyseer input om de dagagenda te vullen.</p></div>
  </section>

  <aside class="side-rail" aria-label="Suggesties en open items">
    <section class="col guidance-column">
      <div class="head"><div><div class="small-title">Agenda suggesties</div><div class="sub">plan · weg</div></div></div>
      <div class="body"><div class="stack attention-stack" id="attentionCol"><p class="empty">Geen agenda-suggesties.</p></div></div>
    </section>

    <section class="col regie-column">
      <div class="head"><div><div class="small-title">Open items</div><div class="sub">antwoord · opslaan · weg</div></div></div>
      <div class="body"><div id="endPromptHost" class="end-prompt-host" aria-live="polite"></div><div class="stack" id="regieCol"></div></div>
    </section>
  </aside>
  <button class="refresh-guidance" id="refreshGuidanceBtn" type="button" title="Ververs suggesties" aria-label="Ververs suggesties">↻</button>
</main>
</body>
</html>

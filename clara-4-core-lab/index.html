<script>
const LAB_VERSION='0.11.14',input=document.getElementById('input'),btn=document.getElementById('analyzeBtn'),statusEl=document.getElementById('status'),agendaCol=document.getElementById('agendaCol'),attentionCol=document.getElementById('attentionCol'),regieCol=document.getElementById('regieCol'),chatLog=document.getElementById('chatLog'),dateTitle=document.getElementById('dateTitle'),dateTime=document.getElementById('dateTime');let lastData=null,statusTimer=null,activeAgendaTab='day',currentController=null,isAnalyzing=false,thinkingId=0;function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function attr(v){return encodeURIComponent(String(v==null?'':v))}function timeToMin(t){if(!t||!/^[0-2]?\d:[0-5]\d$/.test(t))return null;const p=t.split(':').map(Number);return p[0]*60+p[1]}function minToTime(min){if(min===1440)return '00:00';const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}function scrollChatToBottom(){chatLog.scrollTop=chatLog.scrollHeight}function resizeInput(){input.style.height='32px';input.style.height=Math.min(input.scrollHeight,190)+'px'}function setStatus(text,o={}){clearTimeout(statusTimer);statusEl.textContent=text||'';statusEl.className='status'+(text?' visible':'')+(o.error?' error':'');if(text&&!o.error&&!o.persist)statusTimer=setTimeout(()=>{statusEl.textContent='';statusEl.className='status'},1400)}function setAnalyzing(on){isAnalyzing=on;btn.classList.toggle('stop',on);btn.textContent=on?'×':'↑';btn.setAttribute('aria-label',on?'Stop':'Verstuur')}function addThinking(){thinkingId++;const id='thinking-'+thinkingId;chatLog.insertAdjacentHTML('beforeend','<div class="msg assistant thinking-msg" id="'+id+'"><div class="thinking-bubble"><span></span><span></span><span></span></div></div>');scrollChatToBottom();return id}function removeThinking(id){const el=document.getElementById(id);if(el)el.remove()}function updateDate(){con |item.status==='conflict')?'conflict':(item.status==='confirmed'?'confirmed':'pencil'),confirm=item.status==='pencil'?'<button class="confirm-btn" type="button">Bevestig</button>':'';return '<div class="event '+cls+'" style="top:'+top+'%;height:'+height+'%"><div class="event-title-row"><strong>'+esc(item.title)+'</strong>'+confirm+'<span class="event-time-inline">'+esc(item.start_time)+' – '+esc(item.end_time||minToTime(itemEnd))+'</span></div></div>'}).join('');return '<div class="timeline-section"><div class="section-head"><strong>'+label+'</strong><span>'+minToTime(start)+' – '+minToTime(end)+'</span></div><div class="timeline"><div class="axis">'+labels+'</div><div class="events">'+lines+blocks+'</div></div></div>'}function renderAgenda(items){if(!items||!items.length)return '<p class="empty">Geen agenda-items.</p>';const allDay=(items||[]).filter(classifyAllDay),timed=(items||[]).filter(i=>!classifyAllDay(i)&&timeToMin(i.start_time)!=null),dayItems=timed.filter(i=>timeToMin(i.start_time)<19*60),eveItems=timed.filter(i=>timeToMin(i.start_time)>=19*60),shown=activeAgendaTab==='day'?dayItems:eveItems,start=activeAgendaTab==='day'?10:19,end=activeAgendaTab==='day'?19:24,label=activeAgendaTab==='day'?'Dag':'Avond',tabs='<div class="agenda-tabs"><button class="agenda-tab '+(activeAgendaTab==='day'?'active':'')+'" data-agenda-tab="day">Dag</button><button class="agenda-tab '+(activeAgendaTab==='evening'?'active':'')+'" data-agenda-tab="evening">Avond</button></div>',allDayHtml='<div class="all-day">'+(allDay.length?allDay.map(i=>'<span class="all-day-pill">'+esc(i.title)+'</span>').join(''):'<span class="all-day-pill">Geen dagbrede blokken</span>')+'</div>';return tabs+allDayHtml+'<div class="agenda-shell">'+renderTimelineSection(shown,start,end,label)+'</div>'}function deriveSuggestions(data){const suggestions=[],agenda=data.clara_agenda||[];agenda.filter(i=>i.status==='conflict'||i._frontend_conflict).forEach(i=>suggestions.push({title:'Conflict oplossen',text:i.tit >Aandacht</h3>'+listLines(attention.slice(0,5),'dot')+'</div><div class="card"><h3>Taken</h3>'+listLines(tasks.slice(0,8),'box')+'</div>';regieCol.innerHTML='<div class="card"><h3>Planning nodig</h3>'+((cloned.scheduling_needs&&cloned.scheduling_needs.length)?cloned.scheduling_needs.slice(0,3).map(s=>'<div class="item"><span class="dot"></span><span><strong>'+esc(s.title)+'</strong><br><span class="mini">'+esc(s.reason)+'</span></span></div>').join(''):'<p class="empty">Geen planning nodig.</p>')+'</div><div class="card"><h3>Dagcheck '+esc(cloned.day_review?.suggested_time||'')+'</h3>'+listLines((cloned.day_review?.items_to_check||[]).slice(0,7),'box')+'</div><div class="card"><h3>Doorschuiven</h3>'+listLines(cloned.day_review?.rollover_candidates||[],'box')+'</div><div class="card"><h3>Projectcontext</h3>'+(projects.length?projects.map(p=>'<span class="pill">'+esc(p)+'</span>').join(''):'<p class="empty">Geen.</p>')+'</div><div class="card lab"><details><summary>Labdetails</summary><pre>'+esc(JSON.stringify(cloned,null,2))+'</pre></details></div>';addAssistantMessage(buildAssistantText(cloned),deriveSuggestions(cloned))}async function analyzeText(message,showUser=true){if(isAnalyzing&&currentController){currentController.abort();return}const value=String(message||'').trim();if(!value){setStatus('Voer eerst tekst in.',{error:true,persist:true});return}if(showUser)addUserMessage(value);input.value='';resizeInput();currentController=new AbortController();setAnalyzing(true);setStatus('Clara analyseert...', {persist:true});const thinking=addThinking();let stillThinkingTimer=null,timeoutTimer=null;try{stillThinkingTimer=setTimeout(()=>setStatus('Clara denkt nog na...', {persist:true}),20000);timeoutTimer=setTimeout(()=>currentController.abort(),60000);const response=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:contextPayload(value),source:'message'}),signal:currentController.signal}),data=await response.json();if(!response.ok)throw new Error(data.message||data.error||'Analyse mislukt');removeThinking(thinking);render(data);setStatus('Analyse klaar · v'+LAB_VERSION)}catch(error){removeThinking(thinking);const msg=error.name==='AbortError'?'Analyse gestopt.':(error.message||String(error));setStatus(msg,{error:error.name!=='AbortError',persist:true});if(error.name!=='AbortError')addAssistantMessage(msg,[])}finally{clearTimeout(stillThinkingTimer);clearTimeout(timeoutTimer);currentController=null;setAnalyzing(false);scrollChatToBottom()}}function handleSuggestionOk(button){const title=decodeURIComponent(button.dataset.title||''),text=decodeURIComponent(button.dataset.text||''),action=decodeURIComponent(button.dataset.action||'');addUserMessage('Okay');analyzeText('Actie: '+action+'. Voorstel: '+title+'. Context: '+text+'. Voer dit voorstel nu concreet uit of verwerk het in de planning.',false)}chatLog.addEventListener('click',event=>{const btnp=event.target.closest('[data-proposal-action]');if(btnp){const card=btnp.closest('.proposal-card');const kind=btnp.dataset.proposalAction;if(kind==='more'){card.classList.toggle('expanded');btnp.textContent=card.classList.contains('expanded')?'Minder':'Meer'}else if(kind==='decline'){card.classList.add('dismissed')}else if(kind==='ok'){handleSuggestionOk(btnp)}return}});agendaCol.addEventListener('click',event=>{const tab=event.target.closest('[data-agenda-tab]');if(tab){activeAgendaTab=tab.dataset.agendaTab;agendaCol.innerHTML=renderAgenda(lastData?.clara_agenda||[])}});btn.addEventListener('click',()=>analyzeText(input.value,true));input.addEventListener('input',resizeInput);input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();analyzeText(input.value,true)}});resizeInput();updateDate();setInterval(updateDate,1000);

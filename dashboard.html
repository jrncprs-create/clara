<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      padding: 20px;
    }

    .dashboard {
      width: 100%;
      height: calc(100vh - 40px);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
    }

    .panel {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }

    .panel-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 0;
    }

    .timeline-day {
      padding: 18px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .timeline-day:last-child {
      border-bottom: none;
    }

    .timeline-date {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.92);
    }

    .timeline-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .timeline-empty {
      font-size: 14px;
      color: rgba(255,255,255,0.28);
    }

    .timeline-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-left: 2px;
    }

    .timeline-item-title {
      font-size: 15px;
      line-height: 1.35;
      color: #fff;
    }

    .timeline-item-meta {
      font-size: 12px;
      line-height: 1.3;
      color: rgba(255,255,255,0.5);
      text-transform: lowercase;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
    }

    .todo-item {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-title {
      font-size: 15px;
      line-height: 1.35;
      color: #fff;
      margin-bottom: 5px;
    }

    .todo-project {
      font-size: 12px;
      color: rgba(255,255,255,0.48);
      margin-bottom: 5px;
    }

    .todo-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.58);
      text-transform: lowercase;
    }

    .todo-meta.status-not-done {
      color: rgba(255,255,255,0.42);
    }

    .empty-state {
      padding: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.35);
    }

    @media (max-width: 980px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      body {
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Time table</h2>
      </div>
      <div class="panel-body" id="timeline"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">ToDo’s</h2>
      </div>
      <div class="panel-body" id="todos"></div>
    </section>
  </div>

  <script>
    const timelineEl = document.getElementById('timeline')
    const todosEl = document.getElementById('todos')

    function getAmsterdamNow() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Europe/Amsterdam',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hourCycle: 'h23'
      }).formatToParts(new Date())

      const map = {}
      for (const part of parts) {
        map[part.type] = part.value
      }

      return new Date(`${map.year}-${map.month}-${map.day}T${map.hour}:${map.minute}:${map.second}`)
    }

    function getAmsterdamTodayStart() {
      const now = getAmsterdamNow()
      return new Date(now.getFullYear(), now.getMonth(), now.getDate())
    }

    function parseDate(dateStr) {
      if (!dateStr) return null
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return null

      const [year, month, day] = dateStr.split('-').map(Number)
      return new Date(year, month - 1, day)
    }

    function parseDateTime(dateStr, timeStr) {
      const date = parseDate(dateStr)
      if (!date) return null

      if (!timeStr || !/^\d{1,2}:\d{2}$/.test(timeStr)) {
        return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59)
      }

      const [hours, minutes] = timeStr.split(':').map(Number)
      return new Date(date.getFullYear(), date.getMonth(), date.getDate(), hours, minutes, 0)
    }

    function sameDay(a, b) {
      return (
        a &&
        b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      )
    }

    function formatTimelineDate(date) {
      return new Intl.DateTimeFormat('nl-NL', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date)
    }

    function formatShortDateLabel(dateStr, timeStr) {
      const date = parseDate(dateStr)
      if (!date) return 'nieuw'

      const today = getAmsterdamTodayStart()
      const tomorrow = new Date(today)
      tomorrow.setDate(tomorrow.getDate() + 1)

      let dayLabel = new Intl.DateTimeFormat('nl-NL', {
        weekday: 'short',
        day: 'numeric',
        month: 'short'
      }).format(date)

      if (sameDay(date, today)) dayLabel = 'vandaag'
      if (sameDay(date, tomorrow)) dayLabel = 'morgen'

      if (timeStr) return `${dayLabel} ${timeStr}`
      return dayLabel
    }

    function normalizeTodoMeta(item) {
      const now = getAmsterdamNow()
      const hasDate = !!parseDate(item.date)
      const hasTime = !!item.time
      const status = (item.status || '').toLowerCase()

      if (hasDate && hasTime) {
        const moment = parseDateTime(item.date, item.time)
        if (moment && moment < now && status !== 'klaar' && status !== 'done') {
          return { text: 'niet gedaan', className: 'status-not-done' }
        }
      }

      if (hasDate) {
        return { text: formatShortDateLabel(item.date, item.time), className: '' }
      }

      if (status === 'nieuw') {
        return { text: 'nieuw', className: '' }
      }

      return { text: item.status || 'open', className: '' }
    }

    function buildTimelineDays(days = 7) {
      const today = getAmsterdamTodayStart()
      const result = []

      for (let i = 0; i < days; i++) {
        const date = new Date(today)
        date.setDate(today.getDate() + i)
        result.push(date)
      }

      return result
    }

    function getTimelineItems(data) {
      const agendaItems = Array.isArray(data.agenda) ? data.agenda : []
      const taskItems = Array.isArray(data.tasks) ? data.tasks : []

      return [...agendaItems, ...taskItems]
        .filter(item => parseDate(item.date))
        .map(item => {
          const type = (item.type || '').toLowerCase()
          return {
            ...item,
            _dateObj: parseDate(item.date),
            _timeObj: parseDateTime(item.date, item.time),
            _kind: ['afspraak', 'agenda'].includes(type) ? 'afspraak' : 'todo'
          }
        })
        .sort((a, b) => {
          const aTime = a._timeObj ? a._timeObj.getTime() : 0
          const bTime = b._timeObj ? b._timeObj.getTime() : 0
          return aTime - bTime
        })
    }

    function renderTimeline(data) {
      const days = buildTimelineDays(7)
      const items = getTimelineItems(data)

      timelineEl.innerHTML = days.map(day => {
        const dayItems = items.filter(item => sameDay(item._dateObj, day))

        return `
          <div class="timeline-day">
            <div class="timeline-date">${formatTimelineDate(day)}</div>
            <div class="timeline-items">
              ${
                dayItems.length
                  ? dayItems.map(item => `
                      <div class="timeline-item">
                        <div class="timeline-item-title">${escapeHtml(item.title || 'Zonder titel')}</div>
                        <div class="timeline-item-meta">
                          ${item.time ? `${escapeHtml(item.time)} · ` : ''}${item._kind}
                        </div>
                      </div>
                    `).join('')
                  : `<div class="timeline-empty">geen items</div>`
              }
            </div>
          </div>
        `
      }).join('')
    }

    function renderTodos(data) {
      const tasks = Array.isArray(data.tasks) ? data.tasks : []
      const openTasks = tasks.filter(item => {
        const status = (item.status || '').toLowerCase()
        return status !== 'klaar' && status !== 'done'
      })

      if (!openTasks.length) {
        todosEl.innerHTML = `<div class="empty-state">geen open todo’s</div>`
        return
      }

      todosEl.innerHTML = `
        <div class="todo-list">
          ${openTasks.map(item => {
            const meta = normalizeTodoMeta(item)

            return `
              <div class="todo-item">
                <div class="todo-title">${escapeHtml(item.title || 'Zonder titel')}</div>
                ${item.project ? `<div class="todo-project">${escapeHtml(item.project)}</div>` : ''}
                <div class="todo-meta ${meta.className}">${escapeHtml(meta.text)}</div>
              </div>
            `
          }).join('')}
        </div>
      `
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    async function loadDashboard() {
      try {
        const response = await fetch('/api/dashboard')
        const data = await response.json()

        renderTimeline(data)
        renderTodos(data)
      } catch (error) {
        timelineEl.innerHTML = `<div class="empty-state">kon time table niet laden</div>`
        todosEl.innerHTML = `<div class="empty-state">kon todo’s niet laden</div>`
      }
    }

    loadDashboard()
  </script>
</body>
</html>

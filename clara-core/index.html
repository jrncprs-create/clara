<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clara Core</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-body">
        <nav class="side-rail" aria-label="Hoofdnavigatie">
          <div class="side-brand" aria-label="Clara Core">
            <div class="side-logo" aria-hidden="true">C</div>
            <div class="side-brand-text">
              <div class="side-brand-name">Clara Core</div>
              <div class="side-brand-version">v0.15.4.7</div>
            </div>
          </div>

          <button type="button" class="rail-btn is-active" data-drawer="home" title="Vandaag" aria-label="Vandaag">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" class="rail-btn" data-drawer="chat" title="Chat" aria-label="Chat">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M7 18.5 4 20V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M8 9h8M8 12h10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <button type="button" class="rail-btn" data-drawer="tasks" title="Taken" aria-label="Taken">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M9 11.5 11 13.5 15.5 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 4h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" class="rail-btn" data-drawer="notes" title="Notities" aria-label="Notities">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M4 20h4l11-11a2 2 0 0 0 0-3l-1-1a2 2 0 0 0-3 0L4 16v4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M13 6l5 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="rail-spacer"></span>
          <button type="button" class="rail-btn rail-dev" data-action="dev" title="State (dev)">⧉</button>
        </nav>

        <aside class="context-drawer" id="context-drawer" aria-label="Uitleg en chat">
          <div class="drawer-head">
            <button type="button" class="drawer-back" id="drawer-back" hidden>← Start</button>
            <div class="drawer-head-text">
              <h2 class="drawer-title" id="drawer-title">Vandaag</h2>
              <p class="drawer-subtitle" id="drawer-subtitle"></p>
            </div>
          </div>
          <div class="drawer-body" id="drawer-body"></div>
          <div class="drawer-actions hidden" id="drawer-analyze-actions">
            <button type="button" class="btn primary soft" id="analyze-apply">Toepassen</button>
            <button type="button" class="btn ghost soft" id="analyze-dismiss">Niet nu</button>
          </div>
        </aside>

        <main class="calendar-stage">
          <div class="calendar-frame">
            <div id="calendar-empty" class="calendar-empty hidden" aria-live="polite">
              <p class="calendar-empty-title">Nog niets gepland.</p>
              <p class="calendar-empty-hint">Vertel Clara wat er speelt om een voorstel te maken.</p>
            </div>
            <div class="calendar-toolbar" id="calendar-toolbar" aria-label="Kalender controls">
              <div class="daypart-toggle hidden" id="daypart-toggle" aria-label="Dagdeel">
                <button type="button" class="daypart-btn is-active" id="part-day">Overdag</button>
                <button type="button" class="daypart-btn" id="part-evening">Avond</button>
              </div>
            </div>
            <div id="calendar" class="calendar-shell" aria-label="Kalender"></div>
          </div>
        </main>
      </div>
    </div>

    <dialog class="dev-dialog" id="dev-dialog">
      <div class="dev-dialog-head">
        <h2>State (dev)</h2>
        <button type="button" class="icon-btn" id="dev-close" aria-label="Sluiten">×</button>
      </div>
      <p class="dev-hint">Alleen voor ontwikkeling. Geen onderdeel van de gewone werkplek.</p>
      <div class="dev-tools">
        <button type="button" class="btn ghost slim" id="shift-first-item">+30 min (eerste item)</button>
      </div>
      <pre class="dev-pre" id="state-debug" aria-live="polite"></pre>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

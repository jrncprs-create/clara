<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clara Core</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand-mark">C</span>
          <div class="brand-text">
            <span class="brand-name">Clara Core</span>
            <span class="brand-version">v0.15.4.3</span>
          </div>
        </div>

        <div class="topbar-cal-controls" id="cal-controls">
          <div class="seg" role="tablist" aria-label="Weergave">
            <button type="button" class="seg-btn is-active" id="view-week" data-view="week">Week</button>
            <button type="button" class="seg-btn" id="view-day" data-view="day">Dag</button>
          </div>
          <div class="nav-cluster">
            <button type="button" class="icon-btn" id="nav-prev" aria-label="Vorige periode">‹</button>
            <span class="nav-range" id="topbar-range" aria-live="polite">—</span>
            <button type="button" class="icon-btn" id="nav-next" aria-label="Volgende periode">›</button>
          </div>
        </div>

        <div class="topbar-right">
          <span class="sync-pill" id="sync-indicator" aria-live="polite">Sync</span>
          <button type="button" class="icon-btn ghost" id="composer-focus" aria-label="Clara-invoer" title="Clara-invoer">⌘</button>
        </div>
      </header>

      <div class="body">
        <nav class="rail" aria-label="Hoofdnavigatie">
          <button type="button" class="rail-btn is-active" data-drawer="home" title="Start">◎</button>
          <button type="button" class="rail-btn" data-drawer="calendar" title="Agenda">▦</button>
          <button type="button" class="rail-btn" data-drawer="tasks" title="Taken">☑</button>
          <button type="button" class="rail-btn" data-drawer="notes" title="Notities">✎</button>
          <button type="button" class="rail-btn" data-drawer="clara" title="Clara">◇</button>
          <span class="rail-spacer"></span>
          <button type="button" class="rail-btn rail-dev" data-action="dev" title="State (dev)">⧉</button>
        </nav>

        <main class="canvas">
          <div class="calendar-wrap">
            <div id="calendar-empty" class="calendar-empty hidden" aria-live="polite">
              <p class="calendar-empty-title">Nog niets gepland.</p>
              <p class="calendar-empty-hint">Vertel Clara wat er speelt om een voorstel te maken.</p>
            </div>
            <div id="calendar" class="calendar-shell" aria-label="Kalender"></div>
          </div>
        </main>

        <aside class="drawer" id="context-drawer" aria-label="Context">
          <div class="drawer-head">
            <button type="button" class="drawer-back" id="drawer-back" hidden>← Start</button>
            <div class="drawer-head-text">
              <h2 class="drawer-title" id="drawer-title">Vandaag</h2>
              <p class="drawer-subtitle" id="drawer-subtitle"></p>
            </div>
          </div>
          <div class="drawer-body" id="drawer-body"></div>
          <div class="drawer-actions hidden" id="drawer-analyze-actions">
            <button type="button" class="btn primary soft" id="analyze-apply">Toepassen</button>
            <button type="button" class="btn ghost soft" id="analyze-dismiss">Niet nu</button>
          </div>
        </aside>
      </div>

      <div class="composer" id="composer">
        <textarea
          class="composer-input"
          id="composer-input"
          rows="1"
          placeholder="Vertel Clara wat er speelt…"
          autocomplete="off"
        ></textarea>
        <button type="button" class="btn primary slim" id="composer-analyze">Analyze</button>
      </div>
    </div>

    <dialog class="dev-dialog" id="dev-dialog">
      <div class="dev-dialog-head">
        <h2>State (dev)</h2>
        <button type="button" class="icon-btn" id="dev-close" aria-label="Sluiten">×</button>
      </div>
      <p class="dev-hint">Alleen voor ontwikkeling. Geen onderdeel van de gewone werkplek.</p>
      <div class="dev-tools">
        <button type="button" class="btn ghost slim" id="shift-first-item">+30 min (eerste item)</button>
      </div>
      <pre class="dev-pre" id="state-debug" aria-live="polite"></pre>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
